body:
  text: 律詩七言仲春𥘉五日報謁玉磬蒲團出定音謁酬與世費浮沉徑松參漢周官肅䲧竹藏雲商易深暮色溪山皆有道春風花草本無心年來年來頭成白斗酒樓前明月斟多謝多謝東皇著意晴海棠勻趂笑相迎園林富貴何千萬花桞功勳巳十成曉雨有情於芍藥春風無處不流鶯扁舟水長一篙許茶竈筆床聊意行早起早起輕寒尚夾衣飯餘春雨滿行旗春波緑處春草碧曉露濃時曉日晞桃李年年春富貴桑麻事事道精微詩情不在火爐畔風雪灞橋煙景歸厭厭厭厭夜飲忘更深客不來辭主有情僮僕觸屏成蝶夢姬薑壓笛作蟬聲月如有待行行慢風不生嗔細細清萍散人生何可料嬋姢千里共交盟項似道眉子硯集賢得豫同年湯東澗所贊眉子石輒贈梧岡命許某賦之得一首新安硯石舊多竒硯入黃扉得所歸呵水浮雲尢物視傳衣半夜偉人知坡仙為欠十眉詠李及何妨一硯持堪笑泉田老居士無端渾沌盡新眉憶胡同年同年情誼弟兄侔姓不同兮馬范儔吾榜得人今古盛使君與我腹心投斜陽遮斷離愁路野渡撑開别恨舟水調聲中多少事暮煙林壑月明樓賦廷玉菊存堂祖菊園翁孫菊存君家菊譜傲蘭孫天隨天問非他岡命許某賦之得一首新安硯石舊多竒硯入黃扉得所歸呵水浮雲尢物視傳衣半夜偉人知坡仙為欠十眉詠李及何妨一硯持堪笑泉田老居士無端渾沌盡新眉憶胡同年同年情誼弟兄侔姓不同兮馬范儔吾榜得人今古盛使君與我腹心投斜陽遮斷離愁路野渡撑開别恨舟水調聲中多少事暮煙林壑月明樓賦廷玉菊存堂祖菊園翁孫菊存君家菊譜傲蘭孫天隨天問非他岡命許某賦之得一首新安硯石舊多竒硯入黃扉得所歸呵水浮雲尢物視傳衣半夜偉人知坡仙為欠十眉詠李及何妨一硯持堪笑泉田老居士無端渾沌盡新眉憶胡同年同年情誼弟兄侔姓不同兮馬范儔吾榜得人今古盛使君與我腹心投斜陽遮斷離愁路野渡撑開别恨舟水調聲中多少事暮煙林壑月明樓賦廷玉菊存堂祖菊園翁孫菊存君家菊譜傲蘭孫天隨天問非他族秋意秋懷自一門白送繞籬從谷谷黃飄流地彼村村花應自賀三生遇親見淵明無此孫賦吳廷圭篔西亭竹西歌吹古楊州分與延陵第一流直節雪霜霜曉檻虛心風月月明樓東南直道輝青史朔北虛懷動玉旒立盡斜陽更新月纒腰騎鶴此君遊題德新堂同年吾憶鄭盤翁獨向盤銘緊用工似玉躬行勤淬礪如棊世事極磨礲𥘉年晚節渾無斁昨日今朝便不同遺子貽孫新未已盤銘須信有竒功起來起來霜月冷颼颼清興催人不自由萬戶千門胡蝶夢五更三點黑貂裘旦公待旦霜如雪時夜如時月似鈎明日人來問寄字一天霜月倚西樓露輕煙薄霧結凄迷顆顆勻圎訝許齊無雨無風聞葉響如珠如粟壓花低飛來蓮葉仙猶濕吟過林稍蟬不飢散灑劉郎金露掌不垣不戶總京低臨川臨川攝守得仁侯閔雨精誠貫顯幽五日不將京兆看豐年惟切杜陵憂先欣霡霂滋青稻佇見滂沱漲碧流物外間人歡喜處炎天亭受一亭秋送孫山長謁皮參政龍榮授鉞天教錦故鄉公心泉石不常沙堤正自恐不免野渡安能久退藏羡子白劉從緑野顧子雞犬愧旌陽衮衣會趂春風入野服猶堪謁道傍代弟二首少年卜式謾輸邉畢竟鄉人合薦賢純忘寢食浮名過眼謝騰騫聖恩雨露榮親日春酒光風介夀天世事到頭都是夢青衫嬴得畫圗傳看豐年惟切杜陵憂先欣霡霂滋青稻佇見滂沱漲碧流物外間人歡喜處炎天亭受一亭秋送孫山長謁皮參政龍榮授鉞天教錦故鄉公心泉石不常沙堤正自恐不免野渡安能久退藏羡子白劉從緑野顧子雞犬愧旌陽衮衣會趂春風入野服猶堪謁道傍代弟二首少年卜式謾輸邉畢竟鄉人合薦賢純忘寢食浮名過眼謝騰騫聖恩雨露榮親日春酒光風介夀天世事到頭都是夢青衫嬴得畫圗傳渭陽夢斷幾經年幸甚東床再有緣躍鯉庭中看鑄鼎乘龍門外待揚鞭墓碑不載韓翺字文集應傳李漢編愁滿重慈鬢邉雪夜來風雨暗前川挽張丞泳異時兩舉遂登科人謂功名當若何三十餘年空屈曲七咨脫選竟蹉跎為丞再出簿尉下斯世渾如夢覺過同里同年老御史諒難如此不悲歌送周徽州赴建州作牧文公父母州考亭今又借邦侯來莫建山同仰止去思歙水共長流貢茗莫淹千里守和美須是百花頭暇日摩挲寧璧記昔梁叔子後身周次周尚書八首卜隱偏宜大好州浮雲夢不到王侯細評月露蒼山峙靜止花闌緑水流泉簑無雨可淋頭西江賔幕相須久嬴得間吟謁道周溫州今似古青州溫飽能輕百戶侯沃力泉源那擇地歲寒砥柱屹中流要知蟬三公府便是黃扉四狀頭萬事世間唐土爾辦將勳業到伊周公與梅溪生共州一編默受似留侯氷霜歲晚同清節涇渭胸中肯混流皎日當空峩豸角支天一柱屬龍頭時清侭可巢由我身健猶看師宰周曽共芙蓉下視州舊衝仍是醉鄉侯半山相俟歸投老若水公兮急退流世事每觀強努力人生何似大刀頭摛文儘自染燕許間夢何妨我蝶周老氣軒昻蓋四州文場真將屬條侯君扶黃道青如許我住花屏翠欲流禁路促歸一夔足詞場飛跨六鰲頭隱箕山上泉瓢許歌大江東羽扇周后山著意送荆州相伴兒童餞細侯風月夜深獨先覺乾坤秋老不同流江閩凱悌地聫脈關陜規恢天盡頭聞説齊婦唾手世如用孔作東周詩律無寒鄴州家風洗耳侯傳以酒為真印萬法惟梅不共流幸免五經嘲笥腹可無百尺進竿頭從來此道飄零甚戎索惟慿疆以周平原平等視青州不佛不仙仍不侯滿樹絲蘿天富貴半窗水墨月風流皆云臨濟具雙眼且放東坡出一頭劈畫尚能千百歲須臾一笑跨商周排律五言暮春聮句九首清廟朱絃瑟羔羊素緎風釣竿漁艇小園徑李蹊通白酒渾忘送皇天似不公風簷開秀色雪嶺現酥胸王化殊無外聖賢時復中人稱君子子卿自密翁翁從喚酒經癖聊紓花史忠前知安用卜定見不訪訌橘僕使令熟竹君家計豐六年無不可三語將無同桞子慣乞巧韓公不送窮只為士大夫道得介乞字慣畏愛盾衰日清和夷惠風仁何如管仲恩罔極王通王必三微謹天為一大公五行應過眼萬字佛頭胸治國運掌上經書滿腹中慿欄心尚壯引鏡鬢俄翁錫屈天生德教咸黃覽忠齊夷靡瞻騁內外詛萬訌一酌泉流濁四知囊匱豐詠觴聊暢敘羔水辨和同不當陳三價難逃黃九窮祥雲仍瑞日霽月更光風虹夜書船滿雞林詩賈通十行寬四海一國詠三公經史遮眵目古今澆渴胸太玄難凖易皇極辨非中清夜談玄處盛時無極翁乾坤涵奧學日月照孤忠自信區區者遙憐處處訌天無厭周德年侯克商豐群后集班瑞宗人宅受同太平無以報真意渺何窮沃心禆帝學古道暢皇風天下真無敵君前置一通將拚龍尾硯去作魚頭公筆底瀾翻舌談間磊瑰胸通明雲殿上清切玉堂中發軔同安薄深衣獨樂翁孝經題幼志沼鑑見精忠元祐龍蛇雜開禧蟊賊訌隆冬老儒立姦黨一碑豐三晉春秋在千年綱目同長天照孤憤清夜好研窮我似濓溪拙人嗤凝式風天連千障合水可四𬈑通我友二三子他年十八公逍遙吟㺯趣灑落霽光胸傲睨藝香裏醉眠花影中文章解遷史詩律更涪翁與酒交逾密為花謀必忠鶴琴清夜警鶯燕暮春訌氷釋契杜預露晞詢鞏豐幾能知至至學貴不同同山水清音有園林勝事窮徐字不晉帖楚詩無國風山谷誦東坡我詩如曺鄘淺陋不成邦公如大國楚吞五湖三江十五國風無楚詩蓋外之也天邉長劔倚花外小車通不肯吏文叔誰能書子公二三豪俊出數萬甲兵胸桞暗琴三疊梅殘酒一中羡君屠龍技笑我祝雞翁擊甕浮兒志編橋度蟻忠行春奉寬詔佩犢弭兵訌天濶吟邊逺月明詩簷豐秋光宦情薄鵉鶴嘯聲同清澗耳堪洗深山目更窮寸心元有雨八面更當風精衛海能涸杜鵑天可通君臣知有義褒貶豈無公一展霹靂手九吞雲夢胸狂瀾障川外砥柱橫流中曷不身伊尹空教口晦翁主憂臣不辱世亂孰為忠白日青天兵潢池渤海訌居家移官理憂國願年豐今古心符節乾坤理勘同普能知道大院不慮途窮燮調能十雨具訓微三風希聖如顔子何時笑叔通明經徒為利穢史不能公落落經綸腹悠悠錦繡胸茶煙禪榻上花蕊酒杯中皇覽方佳少青衫已秃翁凄涼語棐話寂寞教咸忠青嶂鶴仙返白楊鴉夜訌庭前雙桂樹堂上六經豐皇帝春秋盛車書夷夏同移忠聊士諾獨善未妨窮賀公雅吳語文靖詠唐風我自儒多誤心慙佛六通將焉用彼相不肯為渠公明月夜滿目晴雲曉蕩胸馬更騎東下騮更入花中無慮殊難老有頭能自翁倘徉生計拙瀟散自謀忠白酒杯中滿紅塵門外訌漢輪謾牧叟魯質不周豐自詭氷堅渡如新火浣同青山青未了緑水緑無窮詩雜體途中賡禁體雪韻野店衝寒出曉芭渾如踏月過溪沙五漿先具詹頭蕊六博爭雄屐齒花狐白裘成天不管玉清境淨地無瑕素光自是漁人物披得一簑來酒家十二辰飢鼠簷行驕捷疾蝸牛角立爭竒崛似聞猛虎今陸遊從以卧兔未飄先生龍卧未風雲春蚓秋蛇供醉筆蕭蕭馬鳴斾悠悠牧民如羊良率易人言唐土愧二猴漢使碧雞真浪出屠狗師還戒勿用驅豬試問問王弼題清足堂轆轤格秀翁今又以光名窗外琅玕不欠清十八公松曽入夢兩三竿竹豈無情紅塵不近春風瑟翠色能添夜雪燈我欲釣竿簑笠去斸分煙雨子還能次韻曉行進退格主人别客屢挑燈客喜乘涼月下行暗露濕螢仍濕草曉風殘月更殘更柔情燕燕椒房夜雅韻鶯鶯桂魄晶朝往長沙成夜醉宵征肅肅醉翁亭用名世弟韻進退格大圭白璧男兒事小酌青燈兄弟情倚閣煙雲生别浦高林風月滿踈櫺人生功業何損益外物本心須重輕志節始終非易事退之猶自怵天刑悶來首尾吟悶來時暫作兒嬉沽酒溪邉就買魚鷗鳥水雲天一色梅花雪月地三竒水西何况景尤絶雪後懸知畫不如安得扁舟更簑笠悶來時暫作兒嬉次韻程説和首尾吟燈花昨夜為誰開誰笑泉田處士來不染一塵宜寶界長如三月似天台頻搖塵尾頻揮翰每看蟾輪每舉杯和氣滿堂春拍拍燈花昨夜為誰開先天集卷五
