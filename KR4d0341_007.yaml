front:
  text: 先天集卷七
  hash: sha256:4093ddaee4af0d4c1dc281293de99a7ed0bf307d4437c7b8ad8c701eec2275a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_007-1a}
body:
  text: 記天多許記仰面長嘯天何多馬子才語也吾家西孰面烘窗陽不能以暑秋八月戊申闢之敞其前己酉稱畚挶􅈾災蠧平土塗程板幹繩墻以屏以址以剔以術以迪以滌以甓隙地遂可容客客咸規豫築臺樹桂其處豫曰樹桂成隂如天少何孰若與客舉觴仰嘯共此空濶之天也先是甕牖橫陳驕暑顓制涼飈踵焉謝不領謁曲牖衡從自相枘鑿坌翳所都日月如仇不一二晨宇宙頓豁天無疆界地受約束清飈皓魄結騎偕來間宵意在衆籟銷聲河漢不波天容正清臺符華甚雲物萬狀勵竒納巧經星緯宿告歸指授毛骨盡仙下臨廣寒多哉此天豫取豫求不我靳惜一何幸也客喜而歌得未曽有豫曰西偏屋不多槐榆翳空虛昔吾與退之同病斫却月中桂清光應更多今吾與子美同喜取子才氏語之曰天多客以為何如雖然天在山中象吾心也前言往行識貴乎多多貴乎畜吾兒二三子學焉於西孰畜之先於多乎約禮之先於博文乎誠身之先於明善乎性無內外學有後先識多則天多進乎子才多矣他日此屋有請曰請母氏我以子才氏淳祐十有一年許月卿記友仁先生壙記許氏薑姓也先君諱大寧字寧之徽州婺源許昌人故簽書樞密院事鶴山先生魏文靖公嘗友其仁曰天下仁人也以小篆扁其堂曰友仁對客稱為友仁先生曽祖考諱良故尚書工部侍郎秀巖先生李公題墓道云有宋善士祖考諱安國參知政事鳯山先生李公署以淡軒居士墓道考諱琳故左丞相克齋先生遊靖獻公以長者書墓道之顔先生生而秀頴孝友異常兒左右就飬四親異之十年哭淡軒誠哀如成人執喪如成人厥九年喪長者於是大母張母胡兩世隻景癯於雙鶴先生哀盡然有以得兩母心生其死骨二昆曰吾有弟矣張夫人歿十有五年而胡夫人即世先生哭之若喪長者而哀曰余為童子時筆墨洗空畦徑諸老先生摩其頂曰希有希有朝廷方以進士科級人余傲兀其間歸而讀有司所可者皆余始所為後改之者也又三年率如是轉教人意懶矣胡母欲進士余余如泉石何今吾終不復有母又奚暇進士哉蓋自是不應書先生和平溫厚視人猶已過人不欲人譽巳濟人不欲人德巳性於天世於家然其用力於求仁深矣故當理而無私全體而能惻隱見有藴年者先生為之誦西銘曰謁糴者豈獲已哉挾金不多人往往厭其煩餓者由是衆必多金然後得糴得糴者滋寡殍死者山積安乎先生手權衡背汗滂若無秋毫厭斁意糶未遍家人云食終不食曰一人糴其家待而食者且十人餓吾一人而食之胡不可人私其私以鄰為壑先生不間逺近一之以西銘歲核戶若干口人豫之粟戶戶春風而族姻濃焉曰糴者西銘理一也豫者西銘分殊也藥其病棺衾其死泉幣其窮無告者不必族姻然不幸麗桁楊即衣纊之逵徑闢之石之川不梁造舟而梁之衣冠佩玉不動聲容而悍者神伏狡者心化有不善萌焉畏先生知不敢為者甚多訟不即有司而之先生之廬得片言皆失其所以爭而去常曰松柏之下其草不殖為富不仁者未嘗學問耳故先生之鄉貧富皆得所安急人之急雖犯大寒暑當大患難得疾疢致空乏為世非笑了不顧二昆既逝恤孤扶危有人所甚難者蓋先生一身即西銘也哭從兄端之詩云幾年書案共囊螢豈料于今隔死生回首鶺鴒原上路雲愁煙慘不勝情是時才十有三齡云平生祭必敬祭巳必哀事尊者必盡禮遇少賤必降屈共利必薄取共患必先赴樂道人之善惡稱人之惡憂人之憂樂人之樂出於至誠人為感動犯之不校淆之不濁性有常度終身如一日家傳紫陽夫子之學本身證民坦然明白昜知昜行學者問疑創解輻輳見其進則喜如已子異時場屋人人自祕先生昌言之聞而用其言輒得售司文衡者所擊節處蓋先生語病中讀韓退之文杜子美蘇子瞻詩終身不遺忘曰吾病未嘗無所得用是先生詩文似韓杜蘇晚讀黃魯直詩而説之故暮年詩體一變月卿𥘉能言抱而教之曰假秀實笏擊朱泚顔杲卿面折祿山簡册有光精爽如在惟爾英烈追配古人此髙宗皇帝追賁李若水辭也小子識之淳祐四年月卿幸賜對因憂勤逸樂之問極陳時宰以逸樂二字為竊權之本考官懼第為五甲有旨升第四先生喜曰真吾子也月卿西仕危邊人笑其左先生曰吾教之耳好賔客無日不投轄築群書樓愛蓮閣一觴一咏至者忘歸客方貴盛禮不為加其落陷阱悉力拯之不倦仁之義仁之勇如此夫盤錯遊創而沈靜如愚使用於世才德之傑也生於紹熙四年十一月草日癸未歿于淳祐九年七月七日丙子得年僅五十有七神明不亂笑語而終知與不知皆為流涕更相唁曰世復有仁人如是乎先是欲以少牢享神祠乃輟不享不肉食者不知其幾家或曰仁者壽夫子欺豫哉或曰愚竊聞之矣歲戊申久不雨民無生意先生齋宿籲帝願減齡以救天下其詞良痛明日雨明年先生歿若先生真能行朱文公之學者世之誇口耳曰吾學道德性命遇事輒趨利秦越視人世道日降有由哉聞先生之風庶其有瘳乎此其壽蓋弊天壤矣仲尼不我欺也有雙桂堂藁若干卷減齡詞無藁先生為善不蘄人知類如此其誦言曰隂德如耳鳴人知之者豈隂德耶彼沾沾自表露者相去蓋九牛毛不翅矣娶李氏子男月卿承直郎前差充淮南西路安撫司準備差遣協卿後仲氏日卿時卿業進士女適俞有大張沂季未行嫁孫男允茂允勳允莊允英允芳允葵孫女五人十有二年十一月有一日甲辰葬北珠潭之上孤月卿泣血記題跋書楚辭後虛以待之兮無為之先文公集注謂虛以待之於無為之先恐兩之字當作一樣看虛以待事於無為之先無為事先也無為之先猶言勿為事始事來然後應之不先以事纍吾心也恐屈原本意如此淑離不淫注淑善也離如離立言孤特也按離立出戴記離坐離立毋往參焉離立者不出中間則離為兩人相麗眀矣屈原本意恐謂麗者昜淫惟橘麗而不淫此其所以為善麗也離當訓麗恐不當引離立若引離立則離坐豈亦孤特乎堯都平陽舜都蒲阪禹都韓陽湯都毫文王都豐武王都鎬身都卿相之類都皆訓居今訓為大可謂文王大豐武王大鎬身大卿相乎建邦設都豈可謂建邦設大乎帝髙陽之苗裔兮朕皇考曰伯庸攝提貞於孟陬兮惟庚寅吾以降皇覽揆余于𥘉度兮肇錫余以嘉名名余曰正則兮字余曰靈均紛吾既有此內美兮又重之以修能扈江離與辟芷兮紉秋蘭以為佩集注降叶乎攻反能叶奴代反按此六句一韻也文公以為三韻恐非是庸與降叶如君子至止福祿既同君于萬年保其家邦子之丰兮俟我乎巷兮悔豫不送兮之類是也江與庸叶則降豈不可與庸叶乎蓋四聲通同也庸與名叶如爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩之類是也名與均叶如山有榛隰有苓云誰之思西方美人之類是也能與佩叶如嗇於財親賢而任能此成王冠祝詞也之類是也財與能叶則佩豈不可與能叶乎蓋四聲通同也我送舅氏悠悠我思何以贈之瓊瑰玉佩蓋思亦與財叶也觀于詩可見哀民生之多艱終不察夫民心民人也原自謂也集注以為衆人恐非是但味語脈則可知矣古者民與人通騷經一篇此類甚衆如民生各有所樂集注以為人生相觀民之計極集注以為人事民好惡其不同集注以為人性民之訓人集注既有眀證哀民生之多艱終不察夫民心此二民字亦當訓人蓋原自人也瞻前而顧後集注瞻臨視也顧還視也恐當云瞻仰視也凡後之於前下之於上則言瞻臨者以上臨下也恐非詩靡瞻匪父民具爾瞻魯邦所詹瞻仰昊天論語瞻之在前等意歷吉日乎吾將行集注歷遍數而實選也恐此歷字只是治歷明時之歷不當作經歷字解蓋古者只有此一歷字經歷用此歷字治歷明時亦用此歷字後世以經歷為歷歷象為曆乃後世創立此字以别于經歷耳如堯典曆象亦後世所改跋許氏世譜後右吾許氏世譜王荆公所記也某聞歐文公曝書偶見此忘其荆公所為讀之乃審甚嘆美之某亦以為史遷筆法焉暇日因校以諸書稍正傳寫之謬并語諸子弟曰吾氏自神農以薑姓非昉乎伯夷文公之言殆有當考者若忠孝以世其家某輩尚自力哉淳祐辛丑重九日月卿謹書先天集卷七終
