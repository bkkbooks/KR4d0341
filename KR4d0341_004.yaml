body:
  text: 律詩七言贈黃藻二章參軍一夢到詞場難弟想應瞻聖皇此去捷音來鼎鼎向來諸老去堂堂馬頭雪絮天街玉人跡板橋茆店霜君去世科傳伯氏釣舟留我住嚴光星邑唐詩韻一天參軍生死别經年君來佳句賔朋誦我願世科昆弟傳别語明晨繞朝䇿秋風來歲祖生鞭難兄難弟誇京邑莫負當年夢惠連贈程惠子我朝詩道愧唐人魏晉風流更勿論莊子于今逄惠子孔門自昔契程門君宜鶯出雲霄路我亦猿吟烟水村趂取山人來離谷梅花湖上返詩魂辭賈徽州二首束書歸去饗梅花底事霏英故故斜約住忙中千里鶴羡渠如意兩歸鴉家中見雪念為客客裏觀梅不似家園樹暫時梅鬪白明朝休向我儂誇岫雲休怪此行徐出處家風本俗如當任宣尼無俟駕肯辭孟子範馳驅如金歲月人奔競似玉行藏我卷舒極目冥鴻揮緑綺忘情魚鳥盡江湖三月三月春如少年時了知造化最兒嬉智行無事栁飛絮道法自然花滿枝錦繡園林天冨貴神仙院落月清竒老天長似春三月游嬉人間不皺眉題趙尉洞源泉歸去來詞書印曆髙風千載汝南評松間風影有地籟林下炎天無水聲行客詩魂同石瘦主人心事共泉清明朝遮日長安去君亦曹裝趣上京贈墨士程雲翁滿地干戈正擾攘君家猶自搗龍香輕清披就烟雲三月三月春如少年時了知造化最兒嬉智行無事栁飛絮道法自然花滿枝錦繡園林天冨貴神仙院落月清竒老天長似春三月游嬉人間不皺眉題趙尉洞源泉歸去來詞書印曆髙風千載汝南評松間風影有地籟林下炎天無水聲行客詩魂同石瘦主人心事共泉清明朝遮日長安去君亦曹裝趣上京贈墨士程雲翁滿地干戈正擾攘君家猶自搗龍香輕清披就烟雲質堅徑磨來金玉相倚馬喜資揮露布飛鵉端藉發天章山屋莫道渾無用留寫樵歌入錦囊春日間賦數行竹樹鳴春雨一簇人家帶曉烟省事山丹自籬落親人海燕並庭簷樓髙思逺天無極酒罷歌䦨月正圓新茗一甌香一篆與君清坐看風簾題汪端翁廟雙杉為人所伐端公碑石蔓蘿捫嘆息雙杉拔本根將略傳家自忠顯侍兒梟首亦平原乘風飛去乾坤窄踏月歸來烟水昏往事不堪重回首青燈黃卷照芳樽寄題張宗玉窗下廬山廬山移到龍溪東兩璧生雲無數峯夢與文淵三峽水共參金露九秋風萬山恍對凝塵榻五老同携入室笻更問濓溪風共月又移窗下到腦中賦新花竹花紅竹緑兩相當緑竹紅花在道傍竹引花風心浪動花含竹露靣芬芳須知竹戀花蝴蝶喜見花貪竹鳳凰彼此莫嫌花共竹他年花老竹蒼蒼贈王竹窗若欲相尋向竹邊開窗著屐更誰先定有一輪穿密密可無數點洗涓涓茂林從昔於儂好太極遙憐似我圎釣竿莫惜分新緑更割半窗瀟􅎈天中秋謝施婺源爰髙情古意滿溪梅靜拍欄干儘兩眸月不露圭天有道風能谷水無愁從吾所好萬青壑捨我其誰雙白鷗别樣主人情重處不將紅妓涴中秋和子思弟韻夀母劣相誰知此老天瑶池專遣雪當筵開花敬上夫人夀列樹無非西子妍松學妙齡施粉點鶴迷歸路認蓮船水晶世界瓊梅閣肯道人間不是仙次韻黃玉如求記先子北山書劍留山川還自舊相繆與君去歲銜杯處遣我長歌陟岵游瘦鶴風輕霜檜舞歸鴉烟重晚林投中齊孟氏仙官府同號同庚成佛不時孟之晉為江東憲與玉如同號同庚川原川原紅紫一時新暮雨朝雲更可人燦若中興紅藥相嫣然何慮海棠嗔天將好景煩吟筆我自清時作幸民書册埋頭無了日不如拋却去尋春次允杰五首魏公間氣孰能儔纎若登梯量自優父母床無烹子創相公腹有濟川舟江山之外雲端鶴天地中間海上鷗學進識明涵受闊連天逺水月明樓斯人非與更誰儔咸以無心感最優上下天光萬頃碧乾坤中處一虛舟相從相語何妨鶴才有機心不下鷗平地人間無限闊元龍何必卧危樓相鶴先經古罕儔一詩􅕍括爾才優雲天杳杳仙騏騪蓬海茫茫我楫舟赴隴光榮空似鳳乘軒浩蕩不如鷗淵材多事添煩惱一夜胎仙頻倚樓老鶴吾慚鶯谷儔楊州草檄類徘優千年橘井雉城字萬斛桃花鶴料舟為文待漏書丹鳯如此有盟寒白鷗歌吹竹西驚昨夢眼中騎鶴有髙樓辦香曽侍鶴山儔蜀有鶴林殊匪優蛻作嬰兒生我室化為道士掠豫舟相同龜夀鵬鷃自混雞群狎鷺鷗仙子巳騎黃鶴去此地空餘黃鶴樓六月雨十一首麟筆大書六月雨蟬聲靜掃一天秋天河倒挽甲兵洗地寶咸歸粳稻疇雨餘欹枕軒窗月天際歸帆蘋蓼洲一飽了知天賜履漉巾洗盞辦新篘岫雲巳喜能成雨不卜先知今有秋作楫作霖三說命時暘時雨九箕疇數行竹樹清風夜萬頃烟波明月洲二客從豫遊赤璧歸謀正值酒堪篘先集流傳妙詩句芃芃禾黍舞凉秋九秋寶麗從天落一雨賦興矧若疇月更風流寫松竹雨餘凉意滿汀洲客來且貰鄰壚酒家釀明朝儘可篘雨餘目極乾坤月雪外天連䆉稏秋舜殿風薰殊未玉堯天雨施自君疇層波渝我蒹葭渚列宿嗤人杜若洲珍重菊莊來顧我床頭為子出春篘都忘甲子不知老三十六峯無限秋江水清兮鱗百丈廬山髙處稻盈疇堯時丙子壽星數坡句許家仙島洲自分吾生老耕釣花瓢趂取日先篘五更殊覺洗空憂一雨端能接引秋陋室了知饒鶴料高田無復拆龜疇蒲葵扇老堪藏篋楊柳梢存不見洲混混濁流聊濯足玉泉金井酒宜篘雙星今夜話綢繆頗語人間一夜秋萬事悠悠何預我四方蹙蹙屬之疇萬家旁置傷心地四水宗朝極目洲坐看白雲棲斷處支郎酒老臘前篘行晴坐雨荷天休天地中間獨享秋淡日凉風滿衣屨甘霖薄暮恱田疇晴天歷歷供峯嶼烟雨𪷟𪷟護島洲蹙蹙四方瞻靡騁愁心如醉懶新篘島洲自分吾生老耕釣花瓢趂取日先篘五更殊覺洗空憂一雨端能接引秋陋室了知饒鶴料高田無復拆龜疇蒲葵扇老堪藏篋楊柳梢存不見洲混混濁流聊濯足玉泉金井酒宜篘雙星今夜話綢繆頗語人間一夜秋萬事悠悠何預我四方蹙蹙屬之疇萬家旁置傷心地四水宗朝極目洲坐看白雲棲斷處支郎酒老臘前篘行晴坐雨荷天休天地中間獨享秋淡日凉風滿衣屨甘霖薄暮恱田疇晴天歷歷供峯嶼烟雨𪷟𪷟護島洲蹙蹙四方瞻靡騁愁心如醉懶新篘彭城夜雨悲翁季手植堂前雙桂秋竹馬吾何計東閣巾車何自樂田疇棣華頗失椿萱樹鴈影平沉橘柚洲更憶北山移植處釣魚竿底玉醪篘一月春風洛水幽凛然惟有壑專秋十室九空鴻鴈渚千村萬落𣏌荆疇烏鳥有情瞻岵屺黃龍無底羽淵洲思昔朝廷天廣大何時醢賜伴醪篘今歲無時不禦寇每年此際去防秋琴散廣陵今叔夜笳聲出室古劉疇啓沃欣承霖雨楫流離安樂鴈鴻洲我自清時幸民著茅柴薄晚婦能篘臨川家史君坤翁喜雨臨川鼓舞誦賢侯閔雨皇皇祈有秋昨夜琅函奏霄漢今朝玉粒雨平疇名亭應有東坡記積粟可寬西顧憂我得順流南浦去商霖又是濟川舟浴罷浴罷披襟竹影斜客中殘暑散空花人行窗外雲無腳月起林間燈映紗舉酒聞鐘知近寺談詩食李却忘家明朝又浴還來此何必開樽只煮茶次績溪趙簿孟英見投韻碧澗仙人亦愛樓星溪樓上豁雙眸吟邉興落千峯外醉裏眉攢萬國愁傳舍官途輕似燕禪心世事狎於鷗詩人將半南唐帝碧澗雲烟六月秋次胡伯凱韻作詩直欲到天慳於蒍應如元魯山我隱自便甘曲渚子來相與釣清灣間中日月詩書府地上神仙人世間尋桞問花千古意窗前幽草不須芟贈李企鴈湖曽是謫臨川誰道風流愧昔賢共覺共兜亂堯世何須虞芮質周田三年遷客僅數舍一日恩書落九天歸去來荒松菊徑勉旃忠節振家傳寄東宫官瀛洲有詔翊儲宫妙選歡傳有古風鶴禁共看周八士狐裘記取國三公年華春早雞聲裏博望秋嚴霜氣中入侍緝熙傳聖學四書雋永事何窮題俞時琰杏山堂醫妖冶來奔夜色昏毅然絶谷有神明春融庭畔一簾栁秋滿湖邉萬頃雲蕩滌胃腸無穢濁洞明空色有真清陳樓相問胡盧處本事方書世並行曆日曆日從頭又一新直饒燕雀喜新晴梅花獻嵗無邉景喜鵲今朝第一聲栁眼知時王幕緑草心報國漢朝青日晴夜雨豐年兆雨過雲開月滿庭香潭八首平生不作明河篇一笑童心尚隱然後日視今哀後日同年而語不同年瑩清川澤玻璃地濃淡烟雲水墨天侭向癡人前說夢何妨句裏有嬋娟瓊林宴坐賜詩篇先帝恩光故燁然紫陌尋春思是日紅箋通刺戒同年浮花浪蘂陽和地踈影暗香霜雪天松柏歲寒吾共子春風永巷閉連娟殷勤教我琵琶篇年友胸中炯炯然公瑾風流酬江月孔明禮樂中興年君臣可謂逄千載南北須教總一天水調歌中休惜别月明千里共嬋娟我歌亂以歸來篇君笑騎驢孟浩然君有風雲須得地我無曆日不知年君貪觴咏盟泉石我願朝廷泰地天君去登畿春浩浩我歸受幣女娟娟信筆篇篇又一篇東坡父子故依然鳳凰鳴處知何日龍虎榜中今幾年殘嵗寄寒難避地顛風急雪更無天六宫粉黛無顔色誰道人間少靜姢斗酒從來詩百篇世間莊語便譁然蕙蘭得志應無日稊稗逄時却有年何必怨尤難捨我欲教平治直須天生來不𬒳娥眉誤人謗人間無麗姢老師當日啓靈篇親手傳承豈偶然殘月曉風空夜夜垂楊芳草自年年報恩男子那無地未喪斯文决有天月在香潭照心曲更饒一雨洗姢姢政須洗耳聽新篇業己扁舟學計然潔巳庶幾堪諌主力田未必愧逄年菑畬之業平心地金石之交只在天舞殿歌臺從冷暖此心如月一嬋姢先天集卷四
