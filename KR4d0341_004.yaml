front:
  text: 先天集卷四
  hash: sha256:4d0119ced9cb472aaba00d28d018e6a6cfd0c7b40184414e3aff5a3f51e8878d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_004-1a}
body:
  text: 律詩七言贈黄藻二章叅軍一夣到詞塲難弟想應瞻聖皇此去㨗音來鼎鼎向來諸老去堂堂馬頭雪絮天街玉人跡板橋茆店霜君去世科傳伯氏釣舟留我住嚴光星邑唐詩韻一天叅軍生死别經年君來佳句賔朋誦我願世科昆弟傳别語明晨繞朝䇿秋風來歲祖生鞭難兄難弟誇京邑莫負當年夣惠連贈程惠子我朝詩道愧唐人魏晉風流更勿論荘子于今逄惠子孔門自昔契程門君宜鶯出雲霄路我亦猿吟烟水村趂取山人來離谷梅花湖上返詩魂辭賈徽州二首束書歸去饗梅花底事霏英故故斜約住忙中千里鶴羡渠如意兩歸鴉家中見雪念爲客客裏觀梅不似家園樹暫時梅闘白明朝休向我儂誇岫雲休恠此行徐出䖏家風本俗如當任宣尼無俟駕肯辭孟子範馳驅如金歲月人奔競似玉行蔵我卷舒極目冥鴻揮緑綺忘情魚鳥盡江湖三月三月春如少年時了知造化最兒嬉智行無事栁飛絮道法自然花滿枝錦綉園林天冨貴神仙院落月清竒老天長似春三月游嬉人間不皺眉題趙尉洞源泉歸去來詞書印暦髙風千載汝南評松間風影有地籟林下炎天無水聲行客詩魂同石瘦主人心事共泉清明朝遮日長安去君亦曹裝趣上京贈墨士程雲翁滿地干戈正擾攘君家猶自搗龍香輕清披就烟雲三月三月春如少年時了知造化最兒嬉智行無事栁飛絮道法自然花滿枝錦綉園林天冨貴神仙院落月清竒老天長似春三月游嬉人間不皺眉題趙尉洞源泉歸去來詞書印暦髙風千載汝南評松間風影有地籟林下炎天無水聲行客詩魂同石瘦主人心事共泉清明朝遮日長安去君亦曹裝趣上京贈墨士程雲翁滿地干戈正擾攘君家猶自搗龍香輕清披就烟雲質堅勁磨來金玉相倚馬喜資揮露布飛鵉端藉發天章山屋莫道渾無用留冩樵歌入錦嚢春日閑賦數行竹樹鳴春雨一簇人家帶暁烟省事山丹自籬落親人海燕並庭簷樓髙思逺天無極酒罷歌䦨月正圓新茗一甌香一篆與君清坐看風簾題汪端翁廟双杉爲人所伐端公碑石蔓蘿捫嘆息䨇杉㧞本根將畧傳家自忠顯侍兒梟首亦平原乘風飛去乾坤窄踏月歸來烟水昏徃事不堪重回首青燈黃卷照芳樽寄題張宗玉牕下廬山廬山移到龍溪東兩璧生雲無數峯夣與文淵三峽水共叅金露九秋風萬山恍對凝塵榻五老仝携入室笻更問濓溪風共月又移牕下到脑中賦新花竹花紅竹緑兩相當緑竹紅花在道傍竹引花風心浪動花含竹露靣芬芳湏知竹恋花蝴蝶喜見花貪竹鳳凰彼此莫嫌花共竹他年花老竹蒼蒼贈王竹窓若欲相㝷向竹邊開牕着屐更誰先定有一輪穿宻宻可無數點洗涓涓茂林從昔於儂好太極遥怜似我圎釣竿莫惜分新緑更割半窓瀟􅎈天中秋謝施婺源爰髙情古意滿溪梅静拍欄干儘兩眸月不露圭天有道風能谷水無愁從吾所好萬青壑捨我其誰䨇白鷗别様主人情重處不將紅妓涴中秋和子思弟韻夀母劣相誰知此老天瑶池專遣雪當筵開花敬上夫人夀列樹無非西子妍松學妙齡施粉點鶴迷歸路認蓮船水晶世界瓊梅閣肯道人間不是仙次韻黄玉如求記先子北山書劍留山川還自舊相繆與君去歲㘅盃䖏遣我長歌陟岵游瘦鶴風輕霜檜舞歸鴉烟重晚林投中齋孟氏仙官府同號同庚成佛不時孟之晉爲江東憲與玉如同號同庚川原川原紅紫一時新暮雨朝雲更可人燦若中興紅藥相嫣然何慮海棠嗔天將好景煩吟筆我自清時作幸民書册埋頭無了日不如抛却去㝷春次允杰五首魏公間氣孰能儔纎若登梯量自優父母床無烹子刅相公腹有濟川舟江山之外雲端鶴天地中間海上鷗學進識明涵受闊連天逺水月明樓斯人非與更誰儔咸以無心感最優上下天光萬頃碧乾坤中䖏一虚舟相從相語何妨鶴纔有機心不下鷗平地人間無限闊元龍何必卧危樓相鶴先經古罕儔一詩􅕍括爾才優雲天杳杳仙騏騪蓬海茫茫我楫舟赴隴光榮空似鳳乘軒浩蕩不如鷗淵材多事添煩惱一夜胎仙頻倚樓老鶴吾慚鶯谷儔楊州草檄類徘優千年橘井雉城字萬斛桃花鶴料舟爲文待漏書丹鳯如此有盟寒白鷗歌吹竹西驚昨夣眼中騎鶴有髙樓辦香曽侍鶴山儔蜀有鶴林殊匪優蛻作嬰兒生我室化爲道士掠予舟相同龜夀鵬鷃自混雞群狎鷺鷗仙子巳騎黃鶴去此地空餘黄鶴樓六月雨十一首麟筆大書六月雨蟬聲靜掃一天秋天河倒挽甲兵洗地寳咸歸秔稻疇雨餘欹枕軒牕月天際歸㠶蘋蓼洲一飽了知天賜履漉巾洗盞辦新篘岫雲巳喜能成雨不卜先知今有秋作楫作霖三說命時暘時雨九箕疇數行竹樹清風夜萬頃烟波明月洲二客從予遊赤璧歸謀正值酒堪篘先集流傳妙詩句芃芃禾黍舞凉秋九秋寳麗從天落一雨賦興矧若疇月更風流寫松竹雨餘凉意滿汀洲客來且貰鄰壚酒家釀明朝儘可篘雨餘目極乾坤月雪外天連䆉稏秋舜殿風薫殊未玉堯天雨施自君疇層波渝我蒹葭渚列宿嗤人杜若洲珍重菊荘來顧我床頭爲子出春篘都忘甲子不知老三十六峯無限秋江水清兮鱗百丈廬山髙䖏稻盈疇堯時丙子壽星數坡句許家仙島洲自分吾生老耕釣花瓢趂取日先篘五更殊覺洗空憂一雨端能接引秋陋室了知饒鶴料高田無復拆龜疇蒲葵扇老堪蔵篋楊柳梢存不見洲混混濁流聊濯足玉泉金井酒宜篘䨇星今夜話綢繆頗語人間一夜秋萬事悠悠何預我四方蹙蹙屬之疇萬家旁置傷心地四水宗朝極目洲坐㸔白雲棲斷䖏支郎酒老臘前篘行晴坐雨荷天休天地中間獨享秋淡日凉風滿衣屨甘霖薄暮恱田疇晴天歴歴供峯嶼烟雨𪷟𪷟䕶島洲蹙蹙四方瞻靡騁愁心如醉嬾新篘島洲自分吾生老耕釣花瓢趂取日先篘五更殊覺洗空憂一雨端能接引秋陋室了知饒鶴料高田無復拆龜疇蒲葵扇老堪蔵篋楊柳梢存不見洲混混濁流聊濯足玉泉金井酒宜篘䨇星今夜話綢繆頗語人間一夜秋萬事悠悠何預我四方蹙蹙屬之疇萬家旁置傷心地四水宗朝極目洲坐㸔白雲棲斷䖏支郎酒老臘前篘行晴坐雨荷天休天地中間獨享秋淡日凉風滿衣屨甘霖薄暮恱田疇晴天歴歴供峯嶼烟雨𪷟𪷟䕶島洲蹙蹙四方瞻靡騁愁心如醉嬾新篘彭城夜雨悲翁季手植堂前䨇桂秋竹馬吾何計東閣巾車何自樂田疇棣華頗失椿萱樹鴈影平沉橘柚洲更憶北山移植處釣魚竿底玉醪篘一月春風洛水幽凛然惟有壑專秋十室九空鴻鴈渚千村萬落𣏌荆疇烏鳥有情瞻岵屺黄龍無底羽淵洲思昔朝廷天廣大何時醢賜伴醪篘今歲無時不禦㓂毎年此際去防秋琴散廣陵今叔夜笳聲岀室古劉疇啓沃欣承霖雨楫流離安樂鴈鴻洲我自清時幸民着茅柴薄晚婦能篘臨川家史君坤翁喜雨臨川鼓舞誦賢侯閔雨皇皇祈有秋昨夜琅凾奏霄漢今朝玉粒雨平疇名亭應有東坡記積粟可寛西顧憂我得順流南浦去商霖又是濟川舟浴罷浴罷披襟竹影斜客中殘暑散空花人行牕外雲無脚月起林間燈映紗舉酒聞鐘知近寺談詩食李却忘家明朝又浴還來此何必開樽只煑茶次績溪趙簿孟英見投韻碧澗仙人亦愛樓星溪樓上豁䨇眸吟邉興落千峯外醉裏眉攅萬國愁傳舍官途輕似燕禪心世事狎於鷗詩人將半南唐帝碧澗雲烟六月秋次胡伯凱韻作詩直欲到天慳於蔿應如元魯山我隱自便甘曲渚子來相與釣清湾閑中日月詩書府地上神仙人世間㝷桞問花千古意牕前幽草不湏芟贈李企鴈湖曽是謫臨川誰道風流愧昔賢共覺共兠亂堯世何湏虞芮質周田三年遷客僅數舎一日恩書落九天歸去來荒松菊徑勉旃忠節振家傳寄東宫官瀛洲有詔翊儲宫妙選歡傳有古風鶴禁共㸔周八士狐裘記取國三公年華春早雞聲裏博望秋嚴霜氣中入侍緝熈傳聖學四書雋永事何窮題俞時琰杏山堂醫妖冶來奔夜色昏毅然絶谷有神明春融庭畔一簾栁秋滿湖邉萬頃雲蕩滌胃腸無穢濁洞明空色有真清陳樓相問胡盧處本事方書世並行暦日暦日從頭又一新直饒燕雀喜新晴梅花獻嵗無邉景喜鵲今朝第一聲栁眼知時王幕緑草心報國漢朝青日晴夜雨豐年兆雨過雲開月滿庭香潭八首平生不作明河篇一笑童心尚隱然後日視今哀後日同年而語不同年瑩清川澤玻璃地濃淡烟雲水墨天侭向癡人前說夣何妨句裏有婵娟瓊林宴坐賜詩篇先帝恩光故燁然紫陌㝷春思是日紅牋通刺戒同年浮花浪蘂陽和地踈影暗香霜雪天松栢歲寒吾共子春風永巷閉連娟殷勤教我琵琶篇年友胷中烱烱然公瑾風流酬江月孔明禮樂中興年君臣可謂逄千載南北須教總一天水調歌中休惜别月明千里共婵娟我歌亂以歸來篇君笑騎驢孟浩然君有風雲湏得地我無暦日不知年君貪觴咏盟泉石我願朝廷㤗地天君去登畿春浩浩我歸受幣女娟娟信筆篇篇又一篇東坡父子故依然鳳凰鳴䖏知何日龍虎榜中今幾年殘嵗寄寒難避地顛風急雪更無天六宫粉黛無顔色誰道人間少静姢斗酒從來詩百篇世間荘語便譁然蕙蘭得志應無日稊稗逄時却有年何必怨尤難捨我欲教平治直湏天生來不𬒳娥眉誤人謗人間無麗姢老師當日啓靈篇親手傳承豈偶然殘月暁風空夜夜垂楊芳草自年年報恩男子那無地未喪斯文决有天月在香潭照心曲更饒一雨洗姢姢政湏洗耳聽新篇業己扁舟學計然潔巳庶幾堪諌主力田未必愧逄年菑畬之業平心地金石之交只在天舞殿歌䑓從冷暖此心如月一嬋姢先天集卷四
