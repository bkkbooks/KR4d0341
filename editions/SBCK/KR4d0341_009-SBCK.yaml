front:
  text: 先天集卷九
  hash: sha256:b2606ba59ddeb169fb950f45850b91ae25f77d59223f8191ef8da4710318c357
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_009-1a}
body:
  text: 經義聖王制御常道如何治外之道而律諸古儒者之意逺矣夫乍臣乍叛夷狄之常本不足爲中國輕重也自昔聖人之所以䖏之者恃吾有一定之規扵其來則薄其懲於其去則固其守於其慕義則姑惟以禮覊縻之操縱闔闢其權在我曷嘗舎是以爲制御之道哉後世不知出此動有夷狄難制之憂而外求爲控御之術􅀝戰者威或至於黷恃守者備或至於踈而屈已以爲和者恩又失於䙝在我者無常道徃徃隨時而爲之遷就不知古人制御之道不如是也此班孟堅之賛匃奴歴叙漢家制御之失深有感於聖王之常道也欤聖王制御常道如何請釋其説甚矣待夷狄之不可無常道也無常道而待夷狄則方其强也冀其不吾撓必屈體以狥其欲逮其弱也幸其不吾敵必窮兵以快其忿至其當敵情去來靡定之時則又玩􅀊愒日籍口於備守之一説上之朝思夕惟下之献謀奏慮其所以爲控制駕御之策皆不出扵斯三者而不知適所以為自弊爾扵國家乎何􅀘然則夷狄不可得而制御之乎吁天下之事惟常者可以應変彼雖変詐不勝而吾惟以常待之則其去也吾得以釋然無後日之虞而其來也亦不能以得志扵我制御之規隱然素具卒之國􅀔尊安夷変消弭何莫非常道之功用哉其視夫用威者徒逞扵干戈相㝷之際守備者求詳於邉􅃈謹固之間和親者又不過金繒賂遺行李徃來求之末後寕不大有間􅁘吾以是知聖王以不制制之乃所以爲深制以不御御之乃所以爲深御欤昔周盛時大原薄伐盡境而還此來則禦之常也豈若後世禽􅀗獸獮犁庭掃穴之謂乎采􅅔遣戍止衞中國此去則備之常也豈若後世戈杇鐡鈍老師費財之謂乎裔夷君長執其寳玉咸造以展覲禮館次䖏之國門之外此接之以禮之常也豈若後世㗖之以子女玉帛要之以盟􅊎質約之謂乎乃知備禦綏懐之三者誠先生待夷狄一定之謀歴萬代而下不容昜也柰何漢世則不然盖自髙帝以來平城之􅗮未幾嫚書之辱継至含垢忍耻亦既太甚傳至文帝雖知積粟務農守邉備塞然斥堠望􅇏火將吏披甲胄悠悠􅀊月其可久乎至扵孝武一不勝其忿則命將岀師震威沙漠若足以雪前人之耻而士馬亡失海内虚耗竟何如哉逮夫清渭之朝屈􅂰讋首􅆢珍來賀冝思何道以待之而宣帝君臣方且待以殊禮客而不臣是何待夷狄之乖如此􅁘故終漢之世其備禦綏懷之道胥失之矣冝乎孟堅有感扵此其傳匃奴也既叙其約􅊎攻守之非冝而終則言來懲去備覊縻不絶爲聖王常道乃昔人之所常行而漢人終不復用寕不爲之深憾而重其思古之意欤雖然有苗逆命急扵徂征可也而伯益賛禹乃曰惟徳動天無逺弗屇淮夷既平晏然弛備可也而􅁻甫作􅁔且曰矢其文徳洽此四國西旅献􅋙謂不必深拒可也而召公作誥必曰眀王謹徳四夷咸賔不以區區夷狄強弱叛服為輕重而毎以脩徳爲言先王之所謂常道者母乃在此而不在彼欤使孟堅而果知此則推原古人待夷狄之道冝無大扵此者矣何條析其言曽不岀備禦綏懷之事而已哉劉珖所謂班固之言詳而未盡良有以歟此篇出宋論㑹省觧之作也啓與曹徽州趣装曹参已歌來暮受㕓許子敢缺㳟先具位既激西江以蘇涸輙之鱗盍運南溟以展埀天之翼可以久則久可以速則速時止時行莫之致而致莫之爲而爲有義有命丹墀眷渥雄閣任隆親水地之侯仍木天之閤以昔繍衣之霜凛爲今皂盖之春温惟花屏山練􅅁水之竒􅇜焚林田竭澤漁之後欲囬生意必得貞廉彼貴聀之卿嚢帛匱金而已矣此名世之士淵珠山玉如是哉歡迎西嶼之儒英快覩東嘉之文献唐之壮郡今則漏巵守令牧民不損猶應言損水旱仍􅀊有聞竟不以聞既無思溺猶已之心安得遺利在民之意傳舎而又傳舎冨州那復冨州近因三凖一金銀之􅀜殊􅁴十室九繭􅁝之苦折帛久例忽増一千茶租鑿空驟盈五百他可以􅀋推矣其何以堪此哉拯溺救焚帝遣慈祥之父母興滯􅀘弊公行寛大之詔書民其瘳乎人􅀁欲也因念歙黟之地實爲財利之近觀婺女之范公逺考盤洲之文惠凢而相業一自吾州典舉今年尚憶細侯之竹馬運籌他日却㸔諸葛之木牛駕熟路之輕車添新安之故事月􅀸三秋蕭葛千里嬋姢風􅂃西淮交承托雲仍之久地寒東野覆庇􅀼天幸之多賀朱尚書新渥照乾坤清香森兵衞江西道院已喧來暮之􅁔文昌尚書即拜召還之詔喜真儒之用世多吾榜之得人前有昌􅀺後有魁􅈐可謂冝春之盛事入則周公出則方叔竚㸔中夏之太平訪祖無澤李泰伯之舊逰續黄頴川龔海浡之前傳廷臣傳至右者天子居然器之正此悽然忽聞郵報伊川之信息甚大欲郊迎而拜之夫子至􅀖政必聞不席煖而去矣幾若燕鴻之相避竟乖鳳凰之覩先去速來遲不肯於汝信䖏於汝信宿也别多㑹少機㑹如此邂逅如此粲者何賀蔡公杭郎宿天移使星春至臨海之政不肯媚俗即欲掛冠提泉之命所以表廉便當􅄃轡方楮幣稱提之無䇿故禮樂馳驅之有光欲今地上之流泉莫若屏前之至水貪夫廉懦夫立百城應竦於氷清䏻者用智者謀九府必資之暁暢賀厲制直九陛踈榮八專進律齊小白晋重耳半分天子之旌旗唐學士漢將軍増重元戎之節􅃏若稽寕考厥其尭文峻寳閤之行見海隅之丕用作霖雨爕理隂陽賀余子新娶九月授衣正之子于歸之侯三星在戸協君子偕老之詩載錫之光云胡不喜某㳟承天作之合文定厥祥俾立室家爰講九十其儀之盛􅁵爾士女行衍則百斯男之基鳩関関在河之洲鵉􅎪􅎪于蹶之里卜筮偕止琴瑟友之雖無嘉肴既有肥羜永爲好也共􅁔桃李之三迨其吉兮猶喜摽梅之七碑婺源朱塘晦翁祠碑孔子廟終漢世不岀闕里婺源朱文公之闕里也上即位之十有八年始以公從祀孔子則天下皆得祀况婺源乎二十有三年滕叔和以書來曰先君從㳺於朱塘之上証兄弟子姪既沿文公昨梦之語作晦翁亭又立祠其西為屋若干楹文公南鄉坐先父溪齋先生告院君季父􅂪齋先生合肥君東西鄉以侑焉秋九月庚申告成􅀅徹田聘士以掌扃鑰庶幾中丁之祀勿替引之謹伐石請書其事月􅀸發書嘆曰不亦善乎今佛老之宫神怪之祠布滿宇内而吾黨之儒先頌其詩讀其書顧不得朝夕望其儀刑以自振勵則兹舉也不亦善乎嘗考之二滕公近聞於朱子者曰孟子道性善言必稱尭舜人性無不善則無不可爲尭舜者要不可以一鄉之善士爲足也嗚呼祠宇崇崇像設􅃊􅃊恍然當時師友之凾丈也學者可以自勉矣立志以定其本居敬以持其志窮理以致其知反躬以踐其實雖地之相逺世之相後如㑹一堂况世若此其未逺居若此其近哉雖然爲巳爲人界限之大者也漢唐之儒以聞道之難而學無本近世之儒以聞道之昜而學無實􅀼道徳性命之説以爲譁衆取寵之資俗日以益薄治日以益卑職此之故歟嘉定以来士大夫專以朱氏之學爲仕途㨗徑二滕公當是時退然如未嘗升紫陽之堂者人爲之莞而莫或顧也陵陽李文惠公持節江東旁収朱門記録問荅之語得之如䕶拱璧待其人以殊禮溪齋獨不以徼利焉聞其風者鄙夫寛薄夫厚矣溪齋諱璘字徳粹􅂪齋諱珙字徳章夀不兄若也某既善兹舉不敢以固陋辭遂書其事如左又爲迎饗送神樂章以遺之其辭曰㳺子悲兮故鄉駕余行兮朱塘山深兮水静荷花澹兮自芳昔吾梦兮斯境羗一􅀏兮徜徉冝爲亭兮水上以領畧兮風光去之兮幾何季子兮肯堂亭既峙兮翼翼廟載作兮崇崇蕙殽烝兮蘭藉寒泉碧兮秋菊薌以􅆢兮以嘗以拜兮以饗誰配之兮二滕􅌂師友兮弟兄超忽兮來八荒髣髴兮紛語降若起兮吾思惠我兮光明對越兮屋漏保之兮無疆扶宏綱兮勿之墜萬子孫兮餘慶先天集卷九終
