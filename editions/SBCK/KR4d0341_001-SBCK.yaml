  text: 先天集卷一
  hash: sha256:afd3597626d928c72649c50c05bf4f1b970722ec1ac985f5511947f4c17cdc82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_001-1a}
body:
  text: 星源山屋許月卿著裔孫亮校正熈􅀋編詩四言月代月代太陽太陽代月君逸臣勞職分無越穆穆皇皇明明在烈光于四方罔不秉􅈒火明水清坎離斯設日月有明容光靡􅆣無非教也教亦不屑金取其清分明之精東有啟明西有長庚金清月白助天日明日明相續萬物咸覩匪今斯今不瞽萬古古詩五言次韻春谷谷如三月間屋向萬山安春谷與山屋别有天地寛枯淡風月皎富貴鶯花遶大山表牡丹此意殊未曉箕山箕山惟一瓢襄邑亦四壁古今一許氏傳家以清白茶山與東莱三詩映圭璧後來二三賢題品互紬繹南軒推學授晦翁要事實亦有小東莱經濟亦何切極意深源流敷殖久大業臨川有二許我来秋蕭瑟撫卷三嘆起寒花香的皪送碧梧入府人勸公入相我勸公早歸今以副樞入好以元樞回易爲六經宗學易貴知時時止則時行時義大矣哉故甞論今日兩語見稱竒但且爲執政宰相未可爲若爲伴食相何如酒一盃曽以語􅁉翁􅁉翁爲一咍英雄見畧同明公試思之文正爲清獻何曽美􅂦梅史册香萬古日月名長在時止時則行宰相湏時來時來然後相當傳忠定衣官職難名節願公玉無疵壯節題􅀄節願公玉無􅁅耐久老柱石身佩國安危五福一曰夀夀國身之樞請君㸔老子寡慾身壽眉心清萬里明可杜倖時窺寡慾善養心軒鑑照魅魑􅀊晚成二老種蠡相塤箎坐令四太平太宗生光輝贈胡菊軒拜序表兄菊軒居士胡公予銘戴母古君子之曽孫鄉善人彬州推官汪公之外孫酷似其舅不酒不􅁏雞鳴而起孳孳而誦佛書􅀅以超度十五位我廟之靈余曰范文正公守番母忌前一日命芝山僧誦金剛經夜夣云得古佛經半卷己超度矣明日入山有僧過曰古塔主扣之果如夣中語戯云何必㸔畢曰好物不雖多予曰好物不雖多自悟方悟他心迷法華轉心悟轉法華願得無言經盡度恆河沙盡度一切巳依然無一物􅄜鳴天河斜清風共眀月古詩七言除月二十三日夜夣仙君重瞳衮衣眀紅雲一朶當殿楹千官拜舞環佩鳴中有一人攝齊升琅琅敷誦百辟驚首云有臣許月􅀸合在帝所式群英煌煌召節來帝廷膚使奕奕華􅃓旌我時荷邉食芡菱坐茅心渙儼不聽從天飛下蒼葱珩申傳帝命通叮嚀親授秘訣餐長生提耳言言帝旨令夣回題詩香枕屏次韻陳肇芳竿贈李相士相心然後相人形試相何時可太平集思廣益真宰相開誠布公肝膽傾先相君子與小人小人枉了君子嬴見吾善者􅀏局局眼眀黄山􅄘六六何哉逆整于天誅衰漢生靈已魚肉安得重見無極翁光風霽月黄山谷次韻謝君直贈李相士一年景讓秋光竒山水秋來皆有姿君於何䖏相人物誰爲盗跖誰伯夷伯夷海濵待時清秋空無雲正清時相人不􅀂相時好相時而動談􅀏麾􅀏殺馮道五季時興亡不喜而不悲相師試相馮道相視國傳舎如奕棋京城㸔水幾千萬里碧琉璃中有一圎光照之更無一物可與對部勒星宿光陸離憶昔㸔月大江頭天地中間風吹衣凡客無縁相賔主獨携杯酒獨吟詩祗今千門萬戸閉良夜京華無人知似我快活更有誰故山今宵月更竒明日􅂴人真箇歸故人故人歸作山中相老我聊乘雪夜舟細君頗訝不入市山中訪友􅀅何求扉屨資糧奪之去毁車截鐙挽予留一􅀏謂汝賢細君無求我乃肯出游宰相良觧軒輊予定難屈膝低我頭同雲一色天欲雪夜深雲散月明樓次韻胡温升玉甫西野偶爲西湖萬山出三省興中􅁔四勿中庸公子惠新詩句裏韓筋猶桞骨文章感慨湏和平䏻泣􅀑神風雨驚和聲似鳴國家盛送東野序序文鳴西野文鳴東野法積中和順英華發我詩不作郊島寒曽誅莓苔隨意踏誰道楊花本無才天展湖山圗􅀞開何湏更問逋之覔夜深明月半窓梅次韻臨川老儒王半山文章未肯班傳間亦有臨淄晏元獻樂府一奏開天顔我來此州嗟何晚前哲風流挽不還泉石黯淡山氣瘐芙蓉飄零秋意闌有客携詩來過我議論磊落文波瀾詩盟豈止㝷宗派理學猶規拜􅀅壇風雷凛凛三寸舌招槌賢拂佐天慳古來言行要相副願言大徳不踰閑秋月皎皎鶴蹲蹲春風􅂥􅂥禽􅀜􅀜江岷山兮溪嶓塚天根躡兮月窟攀長短句題明皇貴妃上馬圗開元天寳號太平快活三郎偏縱情帝閑天驥雲雷駃囘首絶怜妃子醉海棠酣春睡未足扶上馬時頽山玉二璫兩邉扶蹋􅌱群姫爭扶不用命萬花叢玉山花花朝王醉牡丹共立馬前黄幡綽獻􅀏顔容似嘲謔三郎勒馬頻囘頭兩手按􅂰䨇凝眸夾立兩旁御弓箭帯御器械如行殿二璫相語儼相向貴妃未至龍顔望龍顔不怡吾曹憂昵昵私語䨇燕秋御前兩驥立仗俟御龍整暇聊緩轡卷中何止數十人十人眼只在一身朕䏻墜馬替妃子不忍花飛驚三郎但念妃子醉豈知身醉誤國事儻知敬是常惺惺提主人翁教醉醒醜醜婦斟薄薄酒醜婦添翁多少壽無塩爲后䏻彊齊夙夜警戒鷄鳴詩花鈿安得紛委地馬嵬安得有墜時渉世渉世如溪谷只宜在淺䖏一生如一日未暮早歸去君不見偉哉男子韓淮隂徃徃正坐渉世深功成身退豈不好當時何事歸不早人生少年湏立事生我不應􅀒天地了􅁍君王事便休去時莫待雨淋頭如今版圗半烟霧眼㸔流離無限子取將舊物還君王襁褓赤子寢之床青天向日正亭午歸去彈琴鶴對舞静與賢傳不春風吹􅃑浴沂天山近山近緑映日山逺青帶烟平生有山癖夣亦山水邉山好水益媚山老水連天我家非洛中亦非獨樂園只在山屋上下亦有流泉俯仰頗樂之妙䖏無昔賢今日來别墅水滿山四環嗚呼何䖏無山水有酒且飲眀月在前山新安新安别無竒只有千萬山千山萬山中其竒乃出焉下者爲硯石與世生雲烟髙者無繫累飄然出神仙忽生朱晦庵追千萬世前示千萬世後如日月當天嗚呼新安生􅀂人不知再生若人是何年先天集卷一山屋許先生事錄公牒一淮西提舉司鄭牒撫幹許迪功伏覩迪功郎濠州司戶參軍差充淮南西路安撫司准偹差遣許孔顔其學韓桞其文􅁬身儒業而才識踈通着足邉陲而事功慷慨今保舉堪充縣令任使除已具錄奏聞外湏至公文牒請照㑹謹牒淳祐九年十月日牒二江浙發運司牒凖遣許迪功伏覩迪功郎差充淮南西路安撫司凖偹差遣許學問該博文辭充贍廷對輸忠權􅀔不避邉防賛晝險阻偹嘗今保舉堪充文華科除已具錄奏聞外湏至公文牒請照㑹謹牒淳祐九年十月日牒三提領戶部財用牒凖遣許迪功伏覩迪功郎差充淮南西路安撫司凖偹差遣許文辭卓犖意氣峥嶸早掇髙科兼通邉事今保舉堪充文華科任使除已具錄奏聞外湏至公文牒請照㑹謹牒淳祐九年十二月日牒趙押事實郡志許月􅀸字太空後字宋士婺源許昌人祖琳輕財好施紹興甲寅大飢盡散家之積粟活萬餘人邑大夫嘉之聞於朝旌其閭曰許長者父大寕字寜之有學行所著有䨇桂堂藁嘗教月􅀸曰叚秀實笏擊朱泚顔杲􅀸面折禄山簡冊有光精爽如在惟爾英烈追配古人此髙宗皇帝追賁李若水訓辭也小子識之月􅀸年十六鄉試冠亞選讀書㠣崌山中三年業成徃師魏文靖公聞六經之要淳祐四年以别院第二人登第廷對專攻史嵩之時徐元􅇐力攻史史隂殺之月􅀸率三學諸生伏闕訟􅁈理宗嘉其忠而外畏史則陽曰許月􅀸狂士也不省除京教言謝相方叔子干政失職未幾謝亦免後又數上書斥丁賈奸邪出佐江西漕宋亡衰服深居三年不言門人江愷常質其故月􅀸大書范粲寝所乘車事以付之後雖言常如病狂不可了卒年七十平生讀書五行並下一覧終身不忘肆意爲文章不可繩墨獨所進百官箴髙古粹宻惻然有愛君之心晚號山屋所著有山屋先天集有書經註及百官箴行於世謝叠山嘗書其門曰要知今日謝枋得便是當年許月􅀸可以想見其人矣子飛字仲鵬所著詩文有小山集邑志許月􅀸字太空以宋亡更字宋士許昌人其父大寜嘗教之讀髙宗追賁李若水之訓辭曰小子識之其忠義之教有自來矣年十六領鄉試徃師魏鶴山始聞六經之要登進士第授濠州司戶辟吕文煥幕以剛直忤煥煥欲殺之不得而殺其僕時徐元􅇐爲史嵩之所殺月􅀸率三學生伏闕訟其􅁈理宗内嘉月􅀸而外畏嵩之陽曰許月􅀸狂士也除京教又言謝方叔之子干政失職謝亦免官因上書斥丁賈奸邪岀佐江西運幹嘗進百官箴以諫及宋亡爲服斬衰而三年不言後常如病狂雖言不可了踰五年卒謝疊山嘗書其門曰要知今日謝枋得便是當年許月􅀸能令人景慕如此所著有山屋集其墓在卅九都鄉賢録許月􅀸字太空後字宋士人稱之曰山屋先生許昌人㓜頴異七嵗能屬文年十六鄉試冠亞選讀書㠣崌山中三年業成徃師魏了翁聞六經之要許飛撰月􅀸行状云年十五從董夣程㳺董爲朱子門人程正思之髙弟端平乙未縣大夫王􅃈俾受學于文靖公子魏子月􅀸徃卒業遂有志當世事淳祐四年登第廷對專攻史嵩之竟以此見抑有旨陞甲賜進士及第授濠州司戸叅軍時徐元􅇐與劉漢弼等力攻史史隂殺之月􅀸率三學諸生伏闕訟􅁈理宗嘉其忠而外畏史則陽曰許月􅀸狂士也不省􅀊丁未及代兼領本州教授攝知録叅軍沿江制置辟月􅀸招撫司從事􅀤運司亦聘入幕㝷丁父憂免喪遷臨安府學教授升黜必當士論數上書言事丞相謝方叔子干政京師目之爲小相嘗使招月􅀸月􅀸不徃時余玠子如孫帥蜀貪殘廢法月􅀸因上言乞斬如孫凾首謝蜀小相怒諷䑓臣擊之因失聀董槐言之理宗特創員外闕留置京師時丁大全居政府故不就寳祐乙邜槐更奏月􅀸入江西庾幕㝷改幹辦本道提舉常平公事待次六年不就使者史繩祖屡書起之既至遇黄萬石有獄賂使者左右枉其事公争之賄以不行於是􅀔家訖無犯法者江右因號公爲鐡符㝷攝提舉事政尚㢘平多所平反江古心執政數薦之朝而憾已者當路竟循丞直郎幹辦浙西安撫司公事不就賈似道平章軍國重事􅁠侔人主至是屡書起之試館職與黄鏞偕召月􅀸言朝政失人心者三事并誦南州髙士林實夫所爲序以諷似道似道佯唯唯未幾以陳冝中昜月􅀸召併浙西聀罷去志云數上書斥丁賈奸邪出佐江西漕乃歩歸故里杜門著書號泉田子宋亡衰服深居五年不言後雖言常如病狂不可了卒年七十月􅀸平生讀書五行並下一覧終身不忘肆意爲文不可繩墨獨所進百官箴髙古粹宻惻然有愛君之心所著有山屋先天集百官箴書經註文獻志許月􅀸字宋士婺源許昌人師魏鶴山淳祐四年進士官止江西運幹號山屋嘗進百官箴以諫宋亡服斬衰不出五年䘚所著曰山屋集南畿志許月􅀸婺源人父大寜有學行嘗教月􅀸曰叚秀實笏擊朱泚顔杲􅀸靣折禄山簡册有光精爽如在惟爾英烈追配古人此髙宗追賁李若水詞也小子識之後月􅀸登第攻擊􅁠貴無少顧忌數上書斥丁賈奸邪出佐江西漕宋亡五年不言雖言亦如病狂䘚年七十謝疊山嘗書其門曰要知今日謝枋得便是當年許月􅀸請建山屋書院文移一直􅀠徽州府婺源縣儒學生員方瓘等呈爲懇崇儒祀請賜祠額以昭風教事宋儒許月􅀸號山屋㓜有大志潜心聖賢之學師事朱子門人董介軒及魏了翁十六􅀊登科廷對始憂勤終逸樂策問謂進逸樂之説者宰相竊權之具即觸奸相見抑後伏闕訟徐元􅇐之􅁈乞斬小相之首皆言人所不敢言以致直道難容官止運幹退居受徒講明正學著書立言而猶夣寐不忘君國撰百官箴數萬言以進􅀤詞愷切歸於正心且謂身可殺而愛君之天不可觧使其終於立朝必能鞠躬盡瘁匡扶宋室惜夫有志未伸宋祚不永衰絰憂服深居抱憾而卒即其愛君愛國之誠忠直出於天性觀其經傳著述之精理學得之真傳其生也天子有狂士之稱士民有鐡符之號其終也謝叠山嘗書其門云要知今日謝枋得便是當年許月􅀸文章道徳忠義氣節令人推服如此人至於今稱之凛然猶有生氣誠大宋之名儒後學之師範也國朝崇儒重徳享祀郡邑鄉賢隆至無闕生等思得婺源先賢自朱子以後惟胡文􅄘許山屋二人爲最山屋之學爲文􅄘所推而忠風義㮣尤其所仰慕顧文􅄘巳有祠院􅆢祀而山屋獨無祠享裔孫許亮欲於本里霞山創祠立塾割田􅆢祀以􅀭前烈盖非但其一時子孫之私情實萬世人心之公議也今幸逄督學宗師老大人馮藴聖賢誠明之學得濓洛淵源之正主張名教扶持正學正陽徳明盛之日諸生慶逄之時也理合具呈伏乞轉申請賜祠額俾得照文􅄘書院事例子孫奕世􅆢祀非惟崇奨先賢維持斯道且使天下學者知所激勵效法而賢者之後不終於冺斯文幸甚世道幸甚爲此合行具呈湏至呈者嘉靖二十四年八月􅀄五日生員方瓘汪大倫呉文光方􅀖慶汪春時等呈一直􅀠徽州府婺源縣儒學為懇崇儒祀請賜祠額以昭風教事准本學生員方瓘等呈前事云云本學未敢擅便擬合申禀爲此學司今將前項縁由申請伏乞照詳施行湏至呈者嘉靖二十四年八月二十四日教諭劉伯瀚訓導楊試項秀司吏魏萬芝一直􅊢徽州府婺源縣爲懇崇儒祀請賜祠額以昭風教事准本學生員方瓘等呈前事云云准此照得宋儒許山屋道藝忠節偹載誌傳文章著述具存經典録祀郡邑鄉賢歴有可稽今其裔孫許亮創專祠以揚前烈生員方瓘等呈舉請賜祠額俾照雲􅄘書院事例子孫奕世􅆢祀以勵後學縁係懇崇儒祀請賜祠額以昭風教事理本縣未敢擅便擬合申禀為此具呈湏至呈者嘉靖二十四年八月二十八日知縣馮綬涪西縣丞饒􅀖弼主簿薛固齡典史晏良佐司吏葉廷光典吏潘熈江有容一申提學察院馮天馭午山批許山屋忠風義槩炳然與日月争光操行如此則道徳性命之藴可徴已是冝褒崇以匡世教一申本府大府余勉學東䑓批㩀諸生所呈攷誌傳所紀則許山屋學行之在當時誠可與胡雲􅄘並駕矣然後學之士附錄丁氏善本書室藏書志一則月卿字太空後字宋士人稱曰山屋先生婺源人年十六鄉試冠亞選淳祐四年以別院第二人登第廷對專攻史嵩之時徐元杰力攻史史隂殺之乃率三學諸生伏闕訟􅁈理宗嘉其忠而外畏史則陽曰月卿狂士也不省除京教言謝相方叔子干政失職未㡬謝亦免又數上書斥丁賈奸邪出佐江西漕宋亡衰服深居三年不言卒年七十謝曡山嘗書其門曰要知今日謝枋得便是當年許月卿可想見其人矣著有山屋先天集及書經注百官箴著於四庫而先天集未見採進即阮元氏亦不進呈厲氏鶚宋詩紀事列其名此嘉靖十三年南京禮部尚書湛若水觀於其裔孫亮而序之附錄二卷乃行狀公牒郡邑志鄉賢錄諸文
