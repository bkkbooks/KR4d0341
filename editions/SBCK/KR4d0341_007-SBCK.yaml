front:
  text: 先天集卷七
  hash: sha256:4093ddaee4af0d4c1dc281293de99a7ed0bf307d4437c7b8ad8c701eec2275a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_007-1a}
body:
  text: 記天多許記仰面長嘯天何多馬子才語也吾家西塾面烘窓陽不能以暑秋八月戊申闢之敞其前己酉稱畚挶􅈾菑蠧平土􅂗程板幹䋲墻以屏以址以剔以術以迪以滌以甓􅂩地遂可容客客咸規予築䑓􅀣桂其䖏予曰􅀣桂成隂如天少何孰若與客舉觴仰嘯共此空濶之天也先是甕牖横陳驕暑顓制凉飈踵焉謝不領謁曲牖衡從自相枘鑿坌翳所都日月如􅄷不一二晨宇宙頓豁天無疆界地受約束清飈皓魄結􅀐偕来閑宵意在衆􅄜銷聲河漢不波天容正清䑓符華甚雲物萬狀勵竒納巧經星緯宿告歸指授毛骨盡仙下臨廣寒多哉此天予取予求不我靳惜一何幸也客喜而歌得未曽有予曰西偏屋不多槐榆翳空虚昔吾與退之同病斫􅁍月中桂清光應更多今吾與子美同喜取子才氏語之曰天多客以為何如雖然天在山中象吾心也前言徃行識貴乎多多貴乎畜吾兒二三子學焉於西塾畜之先於多乎約禮之先於博文乎誠身之先於明善乎性無内外學有後先識多則天多進乎子才多矣他日此屋有請曰請母氏我以子才氏淳祐十有一年許月􅀸記友仁先生壙記許氏姜姓也先君諱大寕字寜之徽州婺源許昌人故簽書樞宻院事鶴山先生魏文靖公嘗友其仁曰天下仁人也以小􅂐扁其堂曰友仁對客稱為友仁先生曽祖考諱良故尚書工部侍郎秀巖先生李公題墓道云有宋善士祖考諱安國叅知政事鳯山先生李公署以淡軒居士墓道考諱琳故左丞相克齋先生游靖獻公以長者書墓道之顔先生生而秀頴孝友異常兒左右就飬四親異之十年哭淡軒誠哀如成人執䘮如成人厥九年䘮長者於是大母張母胡两世􅃗景癯於䨇鶴先生哀盡然有以得两母心生其死骨二昆曰吾有弟矣張夫人歿十有五年而胡夫人即世先生􅂘之若䘮長者而哀曰余為童子時筆墨洗空畦徑諸老先生摩其頂曰希有希有朝廷方以進士科級人余傲兀其間歸而讀有司所可者皆余始所爲後改之者也又三年率如是轉教人意􅂴矣胡母欲進士余余如泉石何今吾終不復有母又奚暇進士哉蓋自是不應書先生和平温厚視人猶已過人不欲人譽巳濟人不欲人徳巳性於天世於家然其用力於求仁深矣故當理而無私全體而能惻隱見有藴年者先生爲之誦西銘曰謁糴者豈􅀗已哉挾金不多人徃徃厭其煩餓者由是衆必多金然後得糴得糴者滋寡殍死者山積安乎先生手權衡背汗滂若無秋毫厭斁意糶未徧家人云食終不食曰一人糴其家待而食者且十人餓吾一人而食之胡不可人私其私以隣爲壑先生不間逺近一之以西銘􅀊覈戶若干口人予之粟戶戶春風而族姻濃焉曰糴者西銘理一也予者西銘分殊也藥其病棺衾其死泉幣其窮無告者不必族姻然不幸麗桁楊即衣纊之逵徑闢之石之川不梁造舟而梁之衣冠佩玉不動聲容而悍者神伏狡者心化有不善萌焉畏先生知不敢為者甚多訟不即有司而之先生之廬得片言皆失其所以爭而去常曰松栢之下其草不殖為富不仁者未嘗學問耳故先生之鄉貧富皆得所安急人之急雖犯大寒暑當大患難得疾疢致空乏爲世非􅀏了不顧二昆旣逝恤􅀌扶危有人所甚難者盖先生一身即西銘也哭從兄端之詩云幾年書案共嚢螢豈料于今隔死生囘首鹡鴒原上路雲愁煙􅃤不勝情是時纔十有三齡云平生祭必敬祭巳必哀事尊者必盡禮遇少賤必降屈共利必薄取共患必先赴樂道人之善惡稱人之惡憂人之憂樂人之樂出於至誠人爲感動犯之不校淆之不濁性有常度終身如一日家傳紫陽夫子之學本身證民坦然明白昜知昜行學者問疑刅解輻輳見其進則喜如已子異時塲屋人人自秘先生昌言之聞而用其言輙得售司文衡者所擊節處盖先生語病中讀韓退之文杜子美蘇子瞻詩終身不遺忘曰吾病未嘗無所得用是先生詩文似韓杜蘇晚讀黄魯直詩而􅀃之故暮年詩體一變月􅀸􅀄能言􅈽而教之曰叚秀實笏擊朱泚顔杲􅀸面折禄山簡册有光精爽如在惟爾英烈追配古人此髙宗皇帝追賁李若水辭也小子識之淳祐四年月􅀸幸賜對因憂勤逸樂之問極陳時宰以逸樂二字爲􅀼權之本考官懼第爲五甲有旨陞第四先生喜曰真吾子也月􅀸西仕危邊人􅀏其左先生曰吾教之耳好賔客無日不投轄築群書樓愛蓮閣一觴一咏至者忘歸客方貴盛禮不爲加其落䧟阱悉力拯之不倦仁之義仁之勇如此夫盤錯㳺刅而沈静如愚使用於世才徳之傑也生於紹熈四年十一月卄日癸未歿于淳祐九年七月七日丙子得年僅五十有七神明不亂􅀏語而終知與不知皆爲流涕更相唁曰世復有仁人如是乎先是欲以少牢享神祠乃輟不享不肉食者不知其幾家或曰仁者壽夫子欺予哉或曰愚􅀼聞之矣􅀊戊申久不雨民無生意先生齋宿籲帝願减齡以救天下其詞良痛明日雨明年先生歿若先生真能行朱文公之學者世之誇口耳曰吾學道德性命遇事輙趋利秦越視人世道日降有由哉聞先生之風庻其有瘳乎此其壽盖􅁦天壌矣仲尼不我欺也有䨇桂堂藁若干卷减齡詞無藁先生爲善不蘄人知􅀋如此其誦言曰隂德如耳鳴人知之者豈隂徳􅁘彼沾沾自表露者相去盖九牛毛不翅矣娶李氏子男月􅀸承直郎前差充淮南西路安撫司准備差遣協􅀸後仲氏日􅀸時􅀸業進士女適俞有大張沂季未行嫁孫男􅁢茂􅁢勲􅁢荘􅁢英􅁢芳􅁢葵孫女五人十有二年十一月有一日甲辰塟北珠潭之上􅀌月􅀸泣血記題䟦書楚辭後虚以待之兮無為之先文公集註謂虚以待之於無爲之先恐兩之字當作一様㸔虚以待事於無為之先無為事先也無爲之先猶言勿爲事始事来然後應之不先以事累吾心也恐屈原本意如此淑離不淫註淑善也離如離立言􅀌特也按離立岀戴記離坐離立毋徃參焉離立者不岀中間則離爲兩人相麗眀矣屈原本意恐謂麗者昜淫惟橘麗而不淫此其所以爲善麗也離當訓麗恐不當引離立若引離立則離坐豈亦􅀌特乎尭都平陽舜都蒲阪禹都韓陽湯都毫文王都豐武王都鎬身都􅀸相之􅀋都皆訓居今訓爲大可謂文王大豐武王大鎬身大􅀸相乎建􅀖設都豈可謂建􅀖設大乎帝髙陽之苗裔兮朕皇考曰伯庸攝提貞於孟陬兮惟庚寅吾以降皇覧揆余于􅀄度兮肇錫余以嘉名名余曰正則兮字余曰靈均紛吾既有此内美兮又重之以􅁱能扈江離與辟芷兮紉秋蘭以爲佩集註降叶乎攻反能叶奴代反按此六句一韻也文公以爲三韻恐非是庸與降叶如君子至止福禄旣同君于萬年保其家􅀖子之丰兮俟我乎巷兮悔予不送兮之􅀋是也江與庸叶則降豈不可與庸叶乎盖四聲通同也庸與名叶如爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩之􅀋是也名與均叶如山有榛隰有苓云誰之思西方美人之􅀋是也䏻與佩叶如嗇於財親賢而任能此成王冠祝詞也之􅀋是也財與能叶則佩豈不可與能叶乎盖四聲通同也我送舅氏悠悠我思何以贈之瓊瑰玉佩盖思亦與財叶也觀于詩可見哀民生之多艱終不察夫民心民人也原自謂也集註以為衆人恐非是但味語脉則可知矣古者民與人通騷經一篇此􅀋甚衆如民生各有所樂集註以為人生相觀民之計極集註以為人事民好惡其不同集註以為人性民之訓人集註既有眀證哀民生之多艱終不察夫民心此二民字亦當訓人盖原自人也瞻前而顧後集註瞻臨視也顧還視也恐當云瞻仰視也凢後之於前下之於上則言瞻臨者以上臨下也恐非詩靡瞻匪父民具爾瞻魯􅀖所詹瞻仰昊天論語瞻之在前等意歴吉日乎吾􅀅行集註歴遍数而實選也恐此歴字只是治歴明時之歴不當作經歴字解盖古者只有此一歴字經歴用此歴字治歴明時亦用此歴字後世以經歴為歴歴象為暦乃後世創立此字以别于經歴耳如尭典暦象亦後世所改䟦許氏世譜後右吾許氏世譜王荆公所記也某聞歐文公曝書偶見此忘其荆公所為讀之乃審甚嘆美之某亦以為史遷筆法焉暇日因校以諸書稍正傳冩之謬并語諸子弟曰吾氏自神農以姜姓非昉乎伯夷文公之言殆有當攷者若忠孝以世其家某軰尚自力哉淳祐辛丑重九日月􅀸謹書先天集卷七終
