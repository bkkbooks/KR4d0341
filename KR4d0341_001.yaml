  text: 先天集卷一
  hash: sha256:afd3597626d928c72649c50c05bf4f1b970722ec1ac985f5511947f4c17cdc82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_001-1a}
body:
  text: 星源山屋許月卿著裔孫亮校正熙類編詩四言月代月代太陽太陽代月君逸臣勞職分無越穆穆皇皇明明在烈光于四方罔不秉哲火明水清坎離斯設日月有明容光靡闕無非教也教亦不屑金取其清分明之精東有啓明西有長庚金清月白助天日明日明相續萬物咸覩匪今斯今不瞽萬古古詩五言次韻春谷谷如三月間屋向萬山安春谷與山屋别有天地寬枯淡風月皎富貴鶯花繞大山表牡丹此意殊未曉箕山箕山惟一瓢襄邑亦四壁古今一許氏傳家以清白茶山與東萊三詩映圭璧後來二三賢題品互紬繹南軒推學授晦翁要事實亦有小東萊經濟亦何切極意深源流敷殖久大業臨川有二許我來秋蕭瑟撫卷三嘆起寒花香的皪送碧梧入府人勸公入相我勸公早歸今以副樞入好以元樞回易為六經宗學易貴知時時止則時行時義大矣哉故嘗論今日兩語見稱竒但且為執政宰相未可為若為伴食相何如酒一杯曽以語𥙿翁𥙿翁為一咍英雄見略同明公試思之文正為清獻何曽美鼎梅史册香萬古日月名長在時止時則行宰相須時來時來然後相當傳忠定衣官職難名節願公玉無疵壯節題𥘉節願公玉無灰耐久老柱石身佩國安危五福一曰夀夀國身之樞請君看老子寡欲身壽眉心清萬里明可杜幸時窺寡欲善養心軒鑑照魅魑歲晚成二老種蠡相塤箎坐令四太平太宗生光輝贈胡菊軒拜序表兄菊軒居士胡公豫銘戴母古君子之曽孫鄉善人彬州推官汪公之外孫酷似其舅不酒不肉雞鳴而起孳孳而誦佛書將以超度十五位我廟之靈余曰范文正公守番母忌前一日命芝山僧誦金剛經夜夢云得古佛經半卷己超度矣明日入山有僧過曰古塔主扣之果如夢中語戲云何必看畢曰好物不雖多豫曰好物不雖多自悟方悟他心迷法華轉心悟轉法華願得無言經盡度恆河沙盡度一切巳依然無一物籟鳴天河斜清風共眀月古詩七言除月二十三日夜夢仙君重瞳衮衣眀紅雲一朵當殿楹千官拜舞環佩鳴中有一人攝齊升琅琅敷誦百辟驚首云有臣許月卿合在帝所式群英煌煌召節來帝廷膚使奕奕華弓旌我時荷邉食芡菱坐茅心渙儼不聽從天飛下蒼蔥珩申傳帝命通叮嚀親授祕訣餐長生提耳言言帝旨令夢回題詩香枕屏次韻陳肇芳竿贈李相士相心然後相人形試相何時可太平集思廣益真宰相開誠布公肝膽傾先相君子與小人小人枉了君子嬴見吾善者笑局局眼眀黃山峯六六何哉逆整于天誅衰漢生靈已魚肉安得重見無極翁光風霽月黃山谷次韻謝君直贈李相士一年景讓秋光竒山水秋來皆有姿君於何處相人物誰為盜跖誰伯夷伯夷海濵待時清秋空無雲正清時相人不若相時好相時而動談笑麾笑殺馮道五季時興亡不喜而不悲相師試相馮道相視國傳舍如奕棋京城看水幾千萬里碧琉璃中有一圎光照之更無一物可與對部勒星宿光陸離憶昔看月大江頭天地中間風吹衣凡客無緣相賔主獨携杯酒獨吟詩祗今千門萬戶閉良夜京華無人知似我快活更有誰故山今宵月更竒明日懶人真箇歸故人故人歸作山中相老我聊乘雪夜舟細君頗訝不入市山中訪友將何求扉屨資糧奪之去毁車截鐙挽豫留一笑謂汝賢細君無求我乃肯出遊宰相良解軒輊豫定難屈膝低我頭同雲一色天欲雪夜深雲散月明樓次韻胡溫升玉甫西野偶為西湖萬山出三省興中歌四勿中庸公子惠新詩句裏韓筋猶桞骨文章感慨須和平能泣鬼神風雨驚和聲似鳴國家盛送東野序序文鳴西野文鳴東野法積中和順英華發我詩不作郊島寒曽誅莓苔隨意踏誰道楊花本無才天展湖山圗畫開何須更問逋之覔夜深明月半窗梅次韻臨川老儒王半山文章未肯班傳間亦有臨淄晏元獻樂府一奏開天顔我來此州嗟何晚前哲風流挽不還泉石黯淡山氣瘐芙蓉飄零秋意闌有客携詩來過我議論磊落文波瀾詩盟豈止尋宗派理學猶規拜將壇風雷凛凛三寸舌招槌賢拂佐天慳古來言行要相副願言大德不踰間秋月皎皎鶴蹲蹲春風泄泄禽關關江岷山兮溪嶓冢天根躡兮月窟攀長短句題明皇貴妃上馬圗開元天寶號太平快活三郎偏縱情帝間天驥雲雷駃回首絶憐妃子醉海棠酣春睡未足扶上馬時頽山玉二璫兩邉扶踏鐙群姫爭扶不用命萬花叢玉山花花朝王醉牡丹共立馬前黃幡綽獻笑顔容似嘲謔三郎勒馬頻回頭兩手按膝雙凝眸夾立兩旁御弓箭帶御器械如行殿二璫相語儼相向貴妃未至龍顔望龍顔不怡吾曹憂昵昵私語雙燕秋御前兩驥立仗俟御龍整暇聊緩轡卷中何止數十人十人眼只在一身朕能墜馬替妃子不忍花飛驚三郎但念妃子醉豈知身醉誤國事儻知敬是常惺惺提主人翁教醉醒醜醜婦斟薄薄酒醜婦添翁多少壽無鹽為后能強齊夙夜警戒雞鳴詩花鈿安得紛委地馬嵬安得有墜時涉世涉世如溪谷只宜在淺處一生如一日未暮早歸去君不見偉哉男子韓淮隂往往正坐涉世深功成身退豈不好當時何事歸不早人生少年須立事生我不應負天地了却君王事便休去時莫待雨淋頭如今版圗半煙霧眼看流離無限子取將舊物還君王襁褓赤子寢之床青天向日正亭午歸去彈琴鶴對舞靜與賢傳不春風吹𬒮浴沂天山近山近緑映日山逺青帶煙平生有山癖夢亦山水邉山好水益媚山老水連天我家非洛中亦非獨樂園只在山屋上下亦有流泉俯仰頗樂之妙處無昔賢今日來别墅水滿山四環嗚呼何處無山水有酒且飲眀月在前山新安新安别無竒只有千萬山千山萬山中其竒乃出焉下者為硯石與世生雲煙髙者無繫纍飄然出神仙忽生朱晦庵追千萬世前示千萬世後如日月當天嗚呼新安生若人不知再生若人是何年先天集卷一山屋許先生事録公牒一淮西提舉司鄭牒撫幹許迪功伏覩迪功郎濠州司戶參軍差充淮南西路安撫司準偹差遣許孔顔其學韓桞其文奮身儒業而才識踈通著足邉陲而事功慷慨今保舉堪充縣令任使除已具録奏聞外須至公文牒請照會謹牒淳祐九年十月日牒二江浙發運司牒凖遣許迪功伏覩迪功郎差充淮南西路安撫司凖偹差遣許學問該博文辭充贍廷對輸忠權勢不避邉防贊晝險阻偹嘗今保舉堪充文華科除已具録奏聞外須至公文牒請照會謹牒淳祐九年十月日牒三提領戶部財用牒凖遣許迪功伏覩迪功郎差充淮南西路安撫司凖偹差遣許文辭卓犖意氣峥嶸早掇髙科兼通邉事今保舉堪充文華科任使除已具録奏聞外須至公文牒請照會謹牒淳祐九年十二月日牒趙押事實郡志許月卿字太空後字宋士婺源許昌人祖琳輕財好施紹興甲寅大飢盡散家之積粟活萬餘人邑大夫嘉之聞於朝旌其閭曰許長者父大寧字寧之有學行所著有雙桂堂藁嘗教月卿曰假秀實笏擊朱泚顔杲卿面折祿山簡册有光精爽如在惟爾英烈追配古人此髙宗皇帝追賁李若水訓辭也小子識之月卿年十六鄉試冠亞選讀書㠣崌山中三年業成往師魏文靖公聞六經之要淳祐四年以别院第二人登第廷對專攻史嵩之時徐元杰力攻史史隂殺之月卿率三學諸生伏闕訟冤理宗嘉其忠而外畏史則陽曰許月卿狂士也不省除京教言謝相方叔子干政失職未幾謝亦免後又數上書斥丁賈姦邪出佐江西漕宋亡衰服深居三年不言門人江愷常質其故月卿大書范粲寢所乘車事以付之後雖言常如病狂不可了卒年七十平生讀書五行並下一覽終身不忘肆意為文章不可繩墨獨所進百官針髙古粹密惻然有愛君之心晚號山屋所著有山屋先天集有書經注及百官針行於世謝疊山嘗書其門曰要知今日謝枋得便是當年許月卿可以想見其人矣子飛字仲鵬所著詩文有小山集邑志許月卿字太空以宋亡更字宋士許昌人其父大寧嘗教之讀髙宗追賁李若水之訓辭曰小子識之其忠義之教有自來矣年十六領鄉試往師魏鶴山始聞六經之要登進士第授濠州司戶辟吕文煥幕以剛直忤煥煥欲殺之不得而殺其僕時徐元杰為史嵩之所殺月卿率三學生伏闕訟其冤理宗內嘉月卿而外畏嵩之陽曰許月卿狂士也除京教又言謝方叔之子干政失職謝亦免官因上書斥丁賈姦邪出佐江西運幹嘗進百官針以諫及宋亡為服斬衰而三年不言後常如病狂雖言不可了踰五年卒謝疊山嘗書其門曰要知今日謝枋得便是當年許月卿能令人景慕如此所著有山屋集其墓在卅九都鄉賢録許月卿字太空後字宋士人稱之曰山屋先生許昌人幼頴異七嵗能屬文年十六鄉試冠亞選讀書㠣崌山中三年業成往師魏了翁聞六經之要許飛撰月卿行狀云年十五從董夢程遊董為朱子門人程正思之髙弟端平乙未縣大夫王瑣俾受學于文靖公子魏子月卿往卒業遂有志當世事淳祐四年登第廷對專攻史嵩之竟以此見抑有旨升甲賜進士及第授濠州司戶參軍時徐元杰與劉漢弼等力攻史史隂殺之月卿率三學諸生伏闕訟冤理宗嘉其忠而外畏史則陽曰許月卿狂士也不省歲丁未及代兼領本州教授攝知録參軍沿江制置辟月卿招撫司從事發運司亦聘入幕尋丁父憂免喪遷臨安府學教授升黜必當士論數上書言事丞相謝方叔子干政京師目之為小相嘗使招月卿月卿不往時余玠子如孫帥蜀貪殘廢法月卿因上言乞斬如孫函首謝蜀小相怒諷臺臣擊之因失聀董槐言之理宗特創員外闕留置京師時丁大全居政府故不就寶祐乙邜槐更奏月卿入江西庾幕尋改幹辦本道提舉常平公事待次六年不就使者史繩祖屢書起之既至遇黃萬石有獄賂使者左右枉其事公爭之賄以不行於是勢家訖無犯法者江右因號公為鐡符尋攝提舉事政尚廉平多所平反江古心執政數薦之朝而憾已者當路竟循丞直郎幹辦浙西安撫司公事不就賈似道平章軍國重事權侔人主至是屢書起之試館職與黃鏞偕召月卿言朝政失人心者三事并誦南州髙士林實夫所為序以諷似道似道佯唯唯未幾以陳冝中昜月卿召併浙西聀罷去志云數上書斥丁賈姦邪出佐江西漕乃步歸故里杜門著書號泉田子宋亡衰服深居五年不言後雖言常如病狂不可了卒年七十月卿平生讀書五行並下一覽終身不忘肆意為文不可繩墨獨所進百官針髙古粹密惻然有愛君之心所著有山屋先天集百官針書經注文獻志許月卿字宋士婺源許昌人師魏鶴山淳祐四年進士官止江西運幹號山屋嘗進百官針以諫宋亡服斬衰不出五年卒所著曰山屋集南畿志許月卿婺源人父大寧有學行嘗教月卿曰假秀實笏擊朱泚顔杲卿靣折祿山簡册有光精爽如在惟爾英烈追配古人此髙宗追賁李若水詞也小子識之後月卿登第攻擊權貴無少顧忌數上書斥丁賈姦邪出佐江西漕宋亡五年不言雖言亦如病狂卒年七十謝疊山嘗書其門曰要知今日謝枋得便是當年許月卿請建山屋書院文移一直隸徽州府婺源縣儒學生員方瓘等呈為懇崇儒祀請賜祠額以昭風教事宋儒許月卿號山屋幼有大志潛心聖賢之學師事朱子門人董介軒及魏了翁十六歲登科廷對始憂勤終逸樂策問謂進逸樂之説者宰相竊權之具即觸姦相見抑後伏闕訟徐元杰之冤乞斬小相之首皆言人所不敢言以致直道難容官止運幹退居受徒講明正學著書立言而猶夢寐不忘君國撰百官針數萬言以進發詞愷切歸於正心且謂身可殺而愛君之天不可解使其終於立朝必能鞠躬盡瘁匡扶宋室惜夫有志未伸宋祚不永衰絰憂服深居抱憾而卒即其愛君愛國之誠忠直出於天性觀其經傳著述之精理學得之真傳其生也天子有狂士之稱士民有鐡符之號其終也謝疊山嘗書其門云要知今日謝枋得便是當年許月卿文章道德忠義氣節令人推服如此人至於今稱之凛然猶有生氣誠大宋之名儒後學之師範也國朝崇儒重德享祀郡邑鄉賢隆至無闕生等思得婺源先賢自朱子以後惟胡文峯許山屋二人為最山屋之學為文峯所推而忠風義概尤其所仰慕顧文峯巳有祠院奉祀而山屋獨無祠享裔孫許亮欲於本里霞山創祠立孰割田奉祀以揚前烈蓋非但其一時子孫之私情實萬世人心之公議也今幸逄督學宗師老大人馮藴聖賢誠明之學得濓洛淵源之正主張名教扶持正學正陽德明盛之日諸生慶逄之時也理合具呈伏乞轉申請賜祠額俾得照文峯書院事例子孫奕世奉祀非惟崇奬先賢維持斯道且使天下學者知所激勵效法而賢者之後不終於泯斯文幸甚世道幸甚為此合行具呈須至呈者嘉靖二十四年八月𥘉五日生員方瓘汪大倫吳文光方邦慶汪春時等呈一直隸徽州府婺源縣儒學為懇崇儒祀請賜祠額以昭風教事準本學生員方瓘等呈前事云云本學未敢擅便擬合申稟為此學司今將前項緣由申請伏乞照詳施行須至呈者嘉靖二十四年八月二十四日教諭劉伯瀚訓導楊試項秀司吏魏萬芝一直􅊢徽州府婺源縣為懇崇儒祀請賜祠額以昭風教事準本學生員方瓘等呈前事云云準此照得宋儒許山屋道藝忠節偹載志傳文章著述具存經典録祀郡邑鄉賢歷有可稽今其裔孫許亮創專祠以揚前烈生員方瓘等呈舉請賜祠額俾照雲峯書院事例子孫奕世奉祀以勵後學緣係懇崇儒祀請賜祠額以昭風教事理本縣未敢擅便擬合申稟為此具呈須至呈者嘉靖二十四年八月二十八日知縣馮綬涪西縣丞饒邦弼主簿薛固齡典史晏良佐司吏葉廷光典吏潘熙江有容一申提學察院馮天馭午山批許山屋忠風義槩炳然與日月爭光操行如此則道德性命之藴可徴已是冝褒崇以匡世教一申本府大府余勉學東臺批據諸生所呈考志傳所紀則許山屋學行之在當時誠可與胡雲峯並駕矣然後學之士附録丁氏善本書室藏書志一則月卿字太空後字宋士人稱曰山屋先生婺源人年十六鄉試冠亞選淳祐四年以別院第二人登第廷對專攻史嵩之時徐元杰力攻史史隂殺之乃率三學諸生伏闕訟冤理宗嘉其忠而外畏史則陽曰月卿狂士也不省除京教言謝相方叔子干政失職未幾謝亦免又數上書斥丁賈姦邪出佐江西漕宋亡衰服深居三年不言卒年七十謝疊山嘗書其門曰要知今日謝枋得便是當年許月卿可想見其人矣著有山屋先天集及書經注百官針著於四庫而先天集未見採進即阮元氏亦不進呈厲氏鶚宋詩紀事列其名此嘉靖十三年南京禮部尚書湛若水觀於其裔孫亮而序之附録二卷乃行狀公牒郡邑志鄉賢録諸文
