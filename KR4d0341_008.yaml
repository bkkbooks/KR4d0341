front:
  text: 先天集卷八
  hash: sha256:bb29db5ca12e115bc7ce8bd0f726f152a8e360196b97d746feea6e5b66eb1f4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_008-1a}
body:
  text: 書上程丞相元鳯書昨告矩堂先生曰上之相凡十有三其四公者巳確乎不泯滅文靖三清獻是已歲月馳駒事功掣肘清義如鏡信史無蹊月卿區區芻蕘豈有他哉願王成佛為錦添花使百世之下論吾皇賢宰相以公為第一人文靖三清獻居然下風月卿亦與有榮焉夫矩堂三士畜我我猶國士報之况主家十二樓一身當三千乎故月卿所言於矩堂者有七於先生者有三一曰服人心矩堂之未相也力排冰山敝屣瑣闥矍鑠請行蜀相泚顙相業已基于此矣逮夫蚌鷸相持螳蟬在後沙堤新築薄海共瞻曰大學中庸之道將行天下乎夫何丞相為承受之謡無能改季氏之舊端明作尚書之笑不能掩天下之目昔日如蒼生何今日如安石何人望頓輕明主增喟懵董之號道傍揶揄大學中庸至是掃地矣司馬文正之相也遮道者如堵墻縱觀者升屋極遼人共相戒曰中國相司馬矣何以得此於人哉月卿謂訥齋行且相矣願以一人心為第一義哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服人心最昜以理感最難以勢屈翰林學士趙汝騰雅有物望端明殿學士趙希聖抑又次焉自汝騰以夫之並召希聖以夫之並除而矩堂為海內所輕夫端明班文昌下固也胡不曰依舊端明殿學士某部尚書則妄議何從而生乎張文潛論韓退之可覆視也矩堂語人曰端明作尚書非某之罪某固嘗爭之上其如計不行言不聼哉以夫君子人也然與汝騰不相樂出命如此不足以得二賢適足以致兩失招虞人以旌是又一鷸蚌也訥齋而相願從容上前希聖汝騰御筆並除端明殿學士提舉萬壽觀兼侍讀並日供職則既無老子韓非同傳之疑又有伯夷太公居周之喜汝騰既至喻以子方潞公之事釋賈復寇恂之憾然後以命汝騰者命以夫則汲直在朝淮南寢謀衆賢和朝萬物和野天下將翕然曰訥齋真宰相矣髙不忘有直聲嘗攝柱下史矣今以大司農召戚謙之權侍郎矣今日太常不是卿汝其來魏求已正郎矣今日汝為廷尉丞王伯晦固曰居憂楊元極章子美乃得待次州郡何用賢如轉石耶舉錯如是安得不至於失人望哉先生其鑒于兹二曰克已私趙與訔餉師重呇科降脫漏泉粟可罪也何至怒之如是人曰與訔得君不能解丞相之嗔他日可知矣明道先生曰四凶之去四凶自取之舜何嘗怒今所過不能化所存不能神他事稱是難以枚舉是平日讀文公四書殊無受用處也鄭毅齋守建明主所以待侍臣也因其免牘遂有别與州郡之命奪以升素所厚之人此豈文公四書哉毅齋在後省前論今豸後論新豸皆正論也坐之廟堂不激不隨如太山喬嶽雖不見其運動而功利可以及物今豸正人必不以一已廢法必不以舊怨廢賢别與州郡之命天下後世有一議矩堂矣宰相如推車如操舟一有偏倚覆敗隨之已私可徇也如宗社何髙斯得曰下供司農卿職事不許歸安吉州此何等指揮耶欲見賢人而不以其道猶欲其入而閉之門也一時罵辱不足言書之於史萬世謂何先生其鑒于兹三曰逺佞人有言責者曰陳淳祖由王憲叔而進憲叔由義民而進淳祖士大夫也憲叔胥也義民幹辦府也淳祖冝提轄左藏庫明主既俞之矣相君斥憲叔不許入私第其吏于省中猶故也義民首惡佚罰何耶世有諧語謂一士大夫雅憎三者胥倡憎也已而官逹乃改其乎生友以為言應之曰二三族者是善事我不見其可憎殊覺子可憎耳此言雖小可以喻大甚矣佞人之難逺也吕惠卿楊畏猶不可用矧蘇師旦周筠乎先生其鑒于兹是三者所以告訥齋也而所以告矩堂之七者訥齋能用之則不龜手之藥或以所封謂賢宰相第一人不在矩堂而在訥齋也訥齋而相月卿所欲言又有大于此者蓋𥘉相第一義也量而後入信而後諫月卿有待焉古今稱賢相者必曰集思慮也廣忠益也蓋聰明或有所遺幾微失於俄頃聖賢之能多農馬之智專故也月卿每觀士大夫告上及廟堂皆用策套作舉子口中語先生耻之月卿亦耻之答吳丞相潛書鈞慈天如五雲冉冉自天而下興懷錫類許賜韓銘二親有靈當冥目于九京矣月卿嘗謂銘墓非古也自東漢以來始有之前此所未有也然孝子慈孫之心舍是將何所托故夫子有取焉蔡伯喈銘墓之誚不能免於劉義之狂考亭無人西山死白鶴去為天上星當今之世舍履翁其誰人子於其親茍有以榮之則一死可見之於地下先生亦人子也推已及人無忠做恕不成伏惟先生念之猶有鬼神其寧無感月卿人耳誓以死報與鄧宰書月卿婺源一逄掖也於中朝縉紳間聞江西鄧夫子為當代偉人恨亡從下東野之拜不自意大君子不鄙夷敝邑而長治之謂必有趨走下風之便顧以流落邉頭不得以民事令尹誦一代不數人之詩惟增陳無已之恨而已月卿比試江東偶預薦名念欲辦儷語致教育之謝屬自東閫書院來臨安一節征塵無由申貢家書來獲知賢令尹作成有加奕奕專緘特賜寵遺俾觀鹿平盛禮月卿既不獲厠迹其間則又頒以折爼禮意優厚自非好賢樂善崇尚風教有古卓魯之遺風何以及此且審教條簡昜誠意懇到一念在民父老咸以為前此所未有月卿又為桑梓之民舉首加額焉旌麾按視阡陌人人獲拜大夫之賢重蒙略去位貌曲賜溫粲書來咸篆尚新也月卿家世以依本分三字符淡軒長者施及諸父恪守家法終歲無隻字到偃室二天之覆月卿不必私禱也扶持弱植更為善類之宗主是祝月卿十一月𥘉祗為肄業計庶幾稍熟時事然桂玉倍價殊有昔人居亦不昜之譏勢須試後一歸省當躬造庭下以展㕓氓之敬退以弟子禮拜函丈爰質生平學問所疑尚冀與進適有家僮便匆匆拜此未盡欲言切乞台照雜著志樂平朱氏榮緑堂銀峯曽出兩言官專打忠良不打姦察院首彈司馬相正言先論李隆山是其緑也祗所以為辱也朱氏番人不銀峯之慕而榮緑之慕吾有取焉仲舒魁也孫弘亦魁也孰榮退之進士也子厚亦進士也孰榮魏公相也荆公亦相也溫公亦相也蔡京亦相也秦檜亦相也孰榮三年而緑者五百人某也賢某也佞某也回某也孝某也悖緑而辱者多矣緑不緑在天榮不榮在我吾知勉其在我者而已在天者吾何知焉眼前何日赤腰下幾時黃赤也黃也未有不自緑始孫弘為博士歸時子厚退自書府就車司馬門時荆公未知制誥時蔡京能令公喜時秦檜未歸自北方時緑而辱者尚少赤黃而辱者滋多然則如之何而可孟子曰仁則榮仲舒榮漢退之榮唐魏公榮慶曆溫公榮元祐亦未有不自緑始朱君方將以緑榮其親吾願朱君以仁榮其緑尚勉旃哉堂在饒之樂平縣金山鄉鵠山里朱公芳之某墓為屋若干楹陳定宇曰山屋方二十一歲有此筆力可敬可敬先天集卷八終
