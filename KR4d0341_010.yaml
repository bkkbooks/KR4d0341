front:
  text: 先天集卷十
  hash: sha256:488abe2c0f85e8e5f19806f0d02534070ee4586a18cae0602e3c420748a1beaf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_010-1a}
body:
  text: 奏疏進大行皇帝挽詞疏略先帝䇿臣等曰文武始于憂勤終于逸樂臣對曰此詩序之言陛下平日之所信者朱熹熹之言曰逸樂之事自古小人竊人主之權則必以逸樂之說進樂不歸君則權不歸已也昏庸之主固昜與也英明之主而小人將竊其權為人主亦安肯拱手而授之權乎故必以逸樂之說進臣切惟逸樂二字宰相市權之具也是時史嵩之獨相考官懼置之末甲先帝特命升一甲人謂徐瀮之書乃八月朔旦臣之對五月十七也實在徐瀮之前既詔召人爭自明或有勸臣亦自明者臣笑謝之劾余玠子如孫疏略玠無義方死有遺辜乞斬如孫函首謝蜀其所盜財以給軍士如此則朝廷不失政刑與大臣之子弟專權亂政者必聳然知懼矣贊唐越國公追封英烈汪王像贊天下鼎沸六州太平大眀既升版圖效靈生為忠臣死為名神此貞觀十八年之畫可以見唐衣冠之舊王容貌之真行狀李太安人行狀夫人李氏諱淑英本貫徽州路婺源縣懷金鄉三溪里友仁先生許公之妻長者之婦淡軒翁之孫婦有宋善士之曽孫婦也生而慧敏早孤事母以孝聞既歸於我父事姑如事母事長姒如事其兄閨門雍睦人曰此一家之唐虞三代也服喪天至節春秋奉嘗齊如也掃松採蘋聲與泗俱友仁先生好賔客觴豆靜嘉殊不聞刀匙聲先生好施豫家比無宿儲夫人怡然雅嗜子朱子之書飲食以之每曰後世以鄭衛之音教女婦邦家安得昌乎供重幣以禮師儒遣其子從介軒先生子董子鶴山先生子魏子遊月卿再為舉首淳祐甲辰禮部正奏名第二族姻姆傅舉酒為夫人夀酒酣夫人曰此兒𥘉䏻言吾夫抱而教之曰假秀實笏擊朱泚顔杲卿面拆祿山簡册有光精爽如此惟爾英烈追配古人此髙宗皇帝追賁李若水詞也小子識之今丞相專以君逸臣勞之說蝕聖主而竊之權吾兒幸而得對言天下所不敢言此吾夫義方之教也五月丙辰月卿對集英殿因憂勤逸樂之問以逸樂市權為對考官懼第為五甲有旨升第四夫人喜曰此真吾子也月卿兩仕危邉夫人獨壯之有非笑者輒為誦蘇文忠所道范孟博語先生沒諸孤凶服四年夫人廩飢梁涉字人孤惸藥物纊生意衍𥙿棺槨叢冢野無暴骸事事如先生在時謝丞相氏有不才子濁亂朝綱月卿攖其鋒失臨安府府學教授丞相兑天子録月卿忠員外置京師從事以寵嘉之夫人處得喪若一君子以為難性勤謹自幼至老不衰諸孤圖所以佚其老而夫人逝矣寶祐三年乙邜十有二月乙酉也得年僅六十以五年葬北珠源日月同逝之日月夫人幼所讀書終身不忘理家不嚴而肅居處進止有常度𥘉寒甚暑不變也戒諸女遇妾媵必曰彼亦人女也其仁類如此治凡絲枲裘裳之政倡以其躬無敢弗祗曽祖考知微妣汪氏祖考頥妣俞氏考季麒妣江氏子男月卿承直郎特添差充兩浙西路安撫司幹辦公事協卿後其仲父日卿時卿女三人俞有大張沂汪汻壻也汻奉議郎新通判臨安軍府應時之嗣子孫男允茂允薰允壯允英允葵允蘭女八人先生之葬也大海閫觀文殿大學士丞相金陵公欲銘之而未遑月卿謹狀夫人行乞銘於公執事謹狀寶祐丁已五年十月日孤月卿狀銘校尉雲屋許公墓銘咸淳癸酉九月五日居仲弟卒越三年乙亥將以十一月丙申葬于遊衝之原其子允芳輩泣拜請曰伯父以文名家凡子孫圗不朽其親者必屬以銘孤不天伯父以為大戚惟窀穸之事有逺日伯父得不有以慰其死而恤其孤而賜之銘拜重泣余亦泣嗚呼仲不可作矣尚忍言耶由江衝府君來世有潜德長者公重以仁厚培之朝奉公學行恢然見知魏文靖公纍薦不起為書二大字揭堂友仁人謂甚稱其德吾兄弟之生謂當大以肆賴天之靈流澤之光既玷一科登仕版仲資過人讀書一覽終身不忘文辭追古作者不止用取青紫􅗲利祿為人寬厚䏻讓橫逆加之怡然未嘗嬰其心名公卿士造吾門見仲必改容為敬勸之仕不苟從一授辟進武校尉尉六合迓者至君淡若無味後竟謝不仕於物寡所嗜獨有愛馬癖覂駕在御馴若羊􅍪且騎且射風起鶻落又不類其恂恂謹飭時治生知義利之辨歲歉鄉里賴君以活小則平價甚則直以賑之皆曰真許長者孫也此人人所知也至其事親懇懇生養盡歡死喪盡戚籲天刲股湯劑間旬月不解帶有吾所不䏻者兄弟族姓知之人或莫知也吾嘗評仲局量似衛玠循分似馬少遊賙急似李士謙風采癖好似王武子吾方閉影泉田須群弟相羊朝夕以忘其老今也栖栖如失群之鴈天長月苦鳴聲轉悲洪忠文銘其從弟子文劉後村銘其從弟審淵矧吾與仲親兄弟乎允芳吾其銘吾同産四人俱以卿名月卿為我日卿為君協卿為次而後伯父時卿其季也君娶李氏生男三人允芳允蘭允益女三人長適張邦韶次適汪靁小者許嫁張觀國孫文夀君生嘉定壬午得年五十二遊衝之卜先葬李姒蓋合祔也墓廬揭以見雲仍君雲屋之號且致狄公之思焉世次德業之懿則有諌議大夫侍讀葉君先君子之銘吾銘仲也有不侍書也而銘也有以也銘曰泰嶽之㣧是為伯夷裔孫許封姓實肇兹猗不仕秦逺死孤壘儒薄朱梁柔也南徙烈風義槩凛乎至公豈平輿之淵曰有二龍大火無光帝邱其圯仲死不知後死奚俟遊衝之阿有松有柏憶弟看雲眼枯無力戴氏母墓銘月卿逮事王母時時為言舊家事小子識之我祖有孫女六而鍾愛其二吾與戴氏婦也逐逐魚隊中不知翁何自知之噫今五十年矣吾女兄弟或不存或無以自存僅僅無失墜惟吾二人在異時或可以拜先人地下翁為知人矣小子識之今又二十年劉日西薄啇芹冬枯久矣而戴氏來徴銘嗚呼忍銘之雖然吾大母之言故如此歷歷忍勿銘孺人諱妙柔姓胡氏其君子諱三益歿時子皆幼人為危之孺人勤身其間禮師儒饌賔親以開諸子聞見闔門數百指柔剛人人惟䏻得其歡心退無不我足者舅姑埀白髮堂上竭誠盡孝視夫未歿有加焉迄使男有立女有歸美哉侖奐儐爾籩豆曰未亡人懼無以見死者暮年𬒳末疾誨敕子若孫不衰年七十有二以殁淳祐三年十有二月六日也七年亦以其月日葬麟池之臯四男子伯桂仲栥仲松仲𣏌二女子嫁將仕郎李嘉猷進士張端平嘉猷先卒孫男女各九人文豹文德應庚端孫榴孫華孫邜孫能孫吉孫女在室㑹孫男三人𥘉里之長饒有古君子曰胡公諱選朴厚而愛人人到于今賢之吾祖妣之祖也處死生𥙿如類有道者然未嘗學佛老固未嘗學相人術而風鑑如許吾祖妣賦鄘柏舟孺人亦如之其殁也皆七十二以為春秋何其甚相似也翁之知人豈庶幾所謂心虗而明者歟因銘戴母并著古君子之事俾不泯銘曰麟池之臯安以吉銘以明之庶其式
