front:
  text: 先天集序甘泉子曰言語之道其誠之不可掩乎誦其詩讀其書而知其人者善言也誦其詩讀其書而不知其人者非善言也誦其詩讀其書知其人也者出乎其心夲乎其性情彂乎其言言出而成攵焉是以由詩書而知其人亦若是而己矣斯不亦善言矣乎若夫誦其詩讀其書不知其人也者言不由乎中不出乎心不本乎性情而擬效乎他人如優人之抵掌為離合悲歡之態粧飾乎雲烟月露之形如巧鳥之聲又烏足以知其人之面目若何哉是故善言者如老人出老人之聲聞其聲可知其為老人矣不善言者如小兒效老人之聲闻其聲人莫知甚爲老人矣故曰言語之道誠之不可揜也余得南宋山屋許先生之詩文曰先天集者于其裔孫亮而觀之嘆曰嘻其所謂善言者乎其由中心出者乎其彂扵性情者乎可以知其人矣故誦其诗讀其書其人逝矣逺矣于其沛然者可以見其自得焉于其慨然者可㠯見其節義焉于其惓惓肰者可以見其忠愛焉扵其言屢而見擯擯而復言國之危亾斬衰閉門至死不變者可以見其大節不可奪之志焉然則先生之為人盡在心目中矣先生名月卿字太空蓋尝受心學于魏鶴山先生而有所自得故其言至今凛凛猶若生氣恍乎若有㕥見先生之謦欬儀形然亮也懇余序諸首簡梓而傳之其
