body:
  text: 亦孝思善繼者歟嘉靖十三年十一月十九日賜進士出身資政大夫南京禮部尚書前國子祭酒翰林侍讀兼修國史經筵講官增城湛若水書先天集目録詩四言卷一月代古詩五言次韻春谷箕山送碧梧入府贈胡菊軒并序古詩七言除月二十三日夜夢次韻陳肇芳竽贈李相士次韻謝君直贈李相士京城看水故人次韻胡溫升玉甫西野次韻長短句題明皇貴妃上馬圖涉世山近新安律詩五言卷二木犀曉幄雲邊明月甥館五首吊程貢元代仍六弟吊程貢元三首挽番陽戴如會貢士母金氏次韻汪敬子挽汪士洪同滕推遊朱緋堂二首挽外舅二首有感住黛障夢中作間賦野人次韻鄭將仕霜日得安道中挽胡制機康侯寄郭衢州因重寄郭衢州寄留夢炎重寄留夢炎夜永客來咸淳送張平湖山遊次胡伯凱韻題項橫父臨清亭時方生孫捧硯姬空翠二首獻歲梅叟挽妹壻汪汻四首燈火月色帝學次韻蜀人李施州芾端午送撫倅林評事歸班天貺飯了大行皇帝挽詞五首贈快霖神靜寄陳宰次韻李制幹贈行山川律詩七言卷三天道木犀次韻晉三姪招豫及同年飲次韻雲岩南堂使華允杰姪以詩來卒章和豫生孫次韻一百首今存四用韻簡如晦用韻自述八角歸塗次韻程願二首寄顧次嶽五首鹿鳴用趙資相韻入邑問炊中雲招王希聖起龍三首遇黃先生和趙資相追賦暮遊次韻葉司戶次韻黃玉如大章携先集來訪二首再和題黃免耕吟藁代仍六弟吊程貢元寄題岩經樓次韻仲成叔賀雙桂橋滿城風雨近重陽挽座主吳倅登慈恩絶頂有感挽陳節使挽李左藏挽清湘令董介軒夢程先生挽馬樞密母假氏次韻朱塘三與陳宰開先迎謁劉朔齋行部提舉律詩七言卷四贈黃藻二章贈程惠子辭賈徽州二首三月題趙尉洞源泉贈墨士程雲翁春日間賦題江端翁廟寄題張宗玉窗下廬山賦新花竹贈王竹窗中秋謝施婺源爰和子思弟韻壽母次韻黃玉如求記川原次允杰五首六月雨十一首臨川家史君坤翁喜雨浴罷次績溪趙簿孟英見投韻次胡伯凱韻贈李企寄東宮官題俞時琰杏山堂醫曆日香潭八首律詩七言卷五仲春初五日報謁多謝早起厭厭項似道眉子硯憶胡同年賦廷玉菊存堂賦吳廷圭篔西亭題德新堂起來露臨川送孫山長謁皮參政代弟二首挽張丞泳送周徽州赴建州次周尚書八首排律五言暮春聮句九首詩雜體途中𢋫禁體雪韻十二辰題清足堂次韻曉行用名世弟韻悶來次韻程説和絶句五言卷六贈朱野拙絶句七言千年黃菊次韻胡同年女人間次韻馬樞密二首入邑道中三首有感二首賀滕推入郡奉祀途問五車中白雪槐影吟蛩朗湖道中因見二事信筆二首贈碧鑑相士蒲田林行可贈談命韓東野春日與鄭婺源賀楊司戶庭玉新安道中無山望中首夏用勻吳初鄰題婺源齋廳次勻胡梅瀧月庵贈寫梅僧處能答雲甫程文贈竹溪贈張相士贈梅隱術士張尉雪後送髙安辛聖祥謁後林送徐君何簘鼓雲護月明咸淳五年天下都散漢許月卿飲無算醉後吟詩秉筆達旦此行樂天風起觀吳廷玉五雲歌書其後而歸之旅􅋙啚次勻周學禮訪渭陽題劉後村所跋楊朴移居啚呈翁司理名方子擢婺邑跋東坡墨迹二芝蘭即事九江寄張立道休休茶䕷默齋璧間竹鶴星學記卷七天多許記友仁先生壙記題跋書楚辭後跋許氏世譜後書卷八上程丞相元鳳書答吳丞相潛書與鄧宰書雜著志樂平朱氏榮緑堂經義卷九聖王制御常道如何啓與曹徽州賀朱尚書賀蔡公杭賀厲制直賀余子新娶碑婺源朱塘晦翁祠碑奏疏卷十進大行皇帝挽詞疏略劾余玠子如孫疏略贊唐􅚼國公追封英烈汪王像贊行狀李太安人行狀銘校尉雲屋許公墓銘戴氏母墓銘附録上臨汝書院講義宋履齋吳公帖宋矩堂董公帖紫源汪公帖東澗湯先生書須溪劉先生書二秋崖方先生書送許允杰序附録下宋運幹山屋先生行狀事録公牒三道事實郡志邑志鄉賢録文獻志南畿志請建山屋書院文移附録上臨汝書院講義出林隱程復心章圗四書山屋許先生月卿為江西倉幹時臨汝書院講中庸首章三句謂文公所謂隂陽五行之氣健順五常之理本於漢時鄭氏注曰木神則仁金神則義火神則禮水神則智土神則信以為水火木金土氣也仁義禮智信理也而有神之一字貫乎其間理形而上者氣形而下者神形而上下之間理不外乎氣氣不外乎理而有神以貫乎理氣之間提挈康成而不悖聖賢之學真能發先儒未發之藴宜乎為蕭大山諸公所敬嘆也宋履齋吳公帖潛伏披芳灑亟誦以感以愧墓銘之諭良仭不鄙但潛今又蹈前轍方爾上歸田之請倘得返吾初服恐可踐約決不敢孤孝子愛親之心也見教諸作暇日尚須大嚼雋永亟此具復斐帥併希加亮右謹具呈八月日觀文殿大學士光祿大夫沿海制置大使判慶元府吳潛劄子宋矩堂董公帖槐伏承帥幹正字不我遐棄殷勤問勞併以前書舊作見示三年千里之别不足以間之也槐前此雖服文名實未測其底藴今觀潛虗發微序引用薪火不滅明有繼也真武夢記引用艮萬物之成終始乃知於已分事不草草為之加敬他文超出翰墨蹊徑無待贅言抑區區愛助以為揭日月而行不如用晦而明蓋玩來字既云欲出仕而無隨世就公明之才欲杜門而無養髙以自安逸之資是未能逺離人間世也幸試思之先太夫人挽章義不可辭第自避隂息影以來未嘗鑽頭入閙藍勉而為詩則吾能毋乃以不情詩者乎若假秀實之訓則炯然在目其何能忘承許枉殺心親千里如對訪戴何足效耶槐年來玩昜稍有氷解凍釋處若有可警䇿者所願聞命草率皇恐切冀亮之十月旦日槐皇恐上狀紫源汪公帖立信洊勒華緘倅以儷製禮意渠渠既感而愧理學之粹見於講義襟度之清見於髙吟謾為贅半語姑以答盛意耳一笑幸甚埀戒薦剡有賢如此而又皇華賢部使懇懇言之何待申諭頃承意雅深願那輟備員所恨剡削之狹不容近舍而逺取遂乖貪賢之意惟有慊然答酬草草伏幸台亮年月日朝散郎直敷文閣沿江副知江州江西安撫提舉屯田汪立信劄子東澗湯先生書漢逖迹英發之論忽忽十年雖尺書無可寄之便然懷仰標度則炯炯如一日也去夏承受人忽遞至翰教琅琅纍􅗀極佩眷記之厚時方為江右之行尋而謝病以歸杜門養痾念欲力謝不敏正以未之所托便中洊領妙墨知未督過既以自幸而怠慢之咎則無所容愧也尊年丈抱負甚竒徊翔滋久新除雖未足多賀然倉幕事簡可以優遊韜望想不免推枕一起道山延閣從此皆分內事矣欽佇欽佇漢衰晚多病積負恩華南昌之命尤為沗越幸假戍期亟亟祗拜年侵才乏未知所以報稱於他日也名章俊語洊勒録教每用嘆仰顧潦倒如此難以與于斯文耳前承下喻尤見用情其時蓋未知漢已力辭閩節虛辱盛指至今有餘愧也偶便拜此以謝連壁之貺既已後時且復簡恱悚怍併深所幾為器寶加重亟承迅擢副此宿期年生朝奉大夫直華文閣新知隆興府湯漢劄子須溪劉先生書會孟前日急走一介追逐拂天之斾不及拜尺𥿄臨發嘗亹亹謝不敏併以詩筒祝鄭宰馳逹想巳上汚清矑將次溪口去兵與盛價偕來伏𬒳誨答層畨纍幅波起浪湧皆駭心動目之觀﨑嶇風雨中不啻抵掌縱談之快慰可知且審西庾上幕之命已從天而下此何足為山屋賀然公朝嚮用之意于此可覘來教鋭欲牢辭此舉固甚偉第區區陋見竊為執事且當如桞下惠之不辭小官未可效涑水翁之不拜樞密副使前修出處要必稱亭適中更惟髙名深思之史倉乃眉人會孟四十年至交名家典刑師事鶴山於書無所不讀在蜀數持麾節雖兵火顛沛中未嘗一日廢卷作郡時手抄九經中庸大學或問章句只一小册其用功可類推魯公敬之前年署為元僚力薦于上召為吏部郎亦有昜説進徹一覽茲又得名流以望幕府是亦氣類感召豈偶然哉昨終日行九折畏途憊甚輒留來伻一日方能稟答終未究所欲言尚存嗣訊伏乞台照江青乃荷轎者故欲其速回乃辱厚犒祇重愧惕耳右謹具申呈正月三日中奉大夫直寶謨閣江東提舉劉會孟劄子二會孟伏荷寵教髙文大册何啻如獲拱壁車中盡閲莫非雄膽新竒之作所謂讀之如清風從戶外至令人耳目聰明所以啓發固陋多矣潛虗發微之貺略窺一二雖未甚解而撿討公之用力此書蓋前輩所未及者尚須它日求質疑于山屋庶方於扶衰起痼真大饒益敢不重拜旅中愧未有少酬盛意也姑此占謝伏乞台照自此更有近作可以下教者只從鄭宰處求便寄示乃佳會孟鄙作真可覆醬瓿小巫見大巫其敢自呈醜拙耶會孟皇恐肅拜又申稟百官針援引精博詞旨懇切真足以動悟君心激昻臣節者韻一假尤前輩所未及孤陋感發多矣感甚感甚秋崖方先生書嶽與執事不面者幾年不書者亦幾年矣山塢荒寒忽奉翰題真如拱壁大寶之墜吾前也一詩一記開闔不能釋手斯亦竒矣名其處曰天多許得不太傷於竒乎蓋執事平生所為文往往亦坐此嶽故嘗以為昜竒而法昌黎之言也好竒自是文章一病山谷之言也然則學者將何從秋崖曰竒可也好竒不可也夫人而好竒也夫人而不能竒也長江大河滔滔沄沄此豈有意於竒哉而竒在是矣至其絶吕梁衝砥柱則堰而風雷噴薄魚龍悲嘯又有不得而不竒者若夫激溝瀆之頑石而落之為奔放書之為命連不可謂不竒而與夫長江大河之滔滔沄沄忽然而絶吕梁衝砥柱之竒則有間矣送許允杰序是篇實為先生天多許記而作故附焉往時許太空見豫竹西才洛陽賈生之年耳得其文一通怪怪竒竒坐人盡驚亡何以其怪竒者取巍科怪竒何負於文哉後二十年太空以書介其從子允杰來見讀其編則亦怪怪竒竒問其年則亦僅僅陸機入洛之歲是何許氏之多英妙而怪竒也豫方老退不得與于斯文見所謂怪怪竒竒則驚耳固嘗問太空曰昌黎謂昜竒而法文竒可也山谷謂竒是文章一病文竒可乎法而不竒程衛尉之治簿書也縱無勝亦無敗竒而不法李將軍之不擊刁斗也不大勝則大敗矣其曰文章一病非歟若歸盡取六經以來至于諸子百氏以及稗官小説騷人賦客之所論著反覆熟之當自見左氏怪竒于春秋莊騷又怪竒于左氏子雲相如同工異曲者又怪竒于莊騷愈降而下之則文人相髙務為艱澀難字生語棘人喉吻而以不能句讀為古則亦陋矣子其毋文勝而理負毋言深而意淺毋論卑而氣弱毋思殆而學罔則怪怪竒竒將又無負于子矣附録下宋運幹山屋先生行狀公諱月卿字太空後字宋士時人稱之曰山屋先生小名千里駒字駒父其先薑姓炎帝神農之世也周武王封伯夷裔孫文叔于許子孫以國為氏自容城徙冀州髙陽北新城遂以髙陽為望秦未許猗隱居不仕雲孫毗為漢侍中生德汝南太守因官寓家德生據典農校尉據生允魏鎮北將軍少子猛為幽州刺史猛生式至平原太守式生販晉司徒掾子詢凡十世至逺守睢陽唐天寶之亂與張巡死節生二子玫婺州司馬現袁州刺史其孫儒不義朱梁與知柔入江南儒生稠仕南唐知柔檢校吏部承傑檢校國子祭酒番陽明口許氏其後也逮江衝府君贅歙之婺源遂為縣人于公為逺祖曽祖父諱安國字獻忠祖父琳字元美皆邑之善士考諱大寧字寧之以學問見知於鶴山先生魏文靖公文靖以友仁扁其堂是為友仁先生嘉定丙子三月庚辰先是夕友仁先生夢使者介胄立廳事一羽衣擁嬰兒授使者使善護之詰旦而公生常言前身道士劉自明蓋有感也公幼而頴異七歲能屬文友仁先生撫而訓之曰假秀實笏擊朱泚顔杲卿靣折祿山惟爾英烈追配古人此髙宗皇帝追賁李若水辭也小子識之年十五從介軒先生董公夢程遊董公者子朱子門人正思先生程公之髙弟也明年以書學應科舉居次榜之首公慨然嘆曰是吾學之未至歸而登邑之㠣崌山閉戶讀書益勵志焉端平乙未縣大夫王塤行鄉飲酒謂公天下竒男子也俾受學文靖公子魏子公往卒業遂有志當世事功絶江適淮時趙公葵開閫江北一見驚異羅致幕中既而以軍功輔進武校尉赴江東漕是歲嘉熙庚子也詔罷鶡辨就舉制遂以試流寓以昜學魁江東淳祐癸卯客左史吕午家載試於漕復為舉首眀年試省别院主文中書侍郎韓祥謂公策真天下措置大事者冝置首選邑人太常博士吳遇龍疑其為公文也避嫌屈置第二將廷對左史言王俠言時事必中請往候之王俠者吳越之俠客也家無擔石之儲而百金可立致復揮之如土先是餘杭失火比及左史氏左史未退朝有為全其家既而歸之者左史德之未知其人居久之然後知其為王俠也公造俠俠笑曰子亦來見我乎抑左史之饒舌乎吾視子之才足為天下先為子計者寧逆驪龍之鱗母拂豺狼之性豺狼蓋指權相史嵩之而言也公怫然而起曰吾寧殿多士專攻丄身吾所不為吾必言天下所不敢言者既而策題有始憂勤終逸樂之問公對言臣聞文武有憂勤而無逸樂進逸樂之説者趙髙髙拱深居之謀此秦之所繇亡也逸樂無度則居人者失權若太阿之倒持而授人以柄雖欲勿傷焉得而不傷書曰一日二日萬機文王日中昃不遑暇食豈逸樂之謂哉竟以觸時相見抑有旨升甲賜進士及第授濠州司戶參軍時徐公元杰與劉漢弼等言權相冤死公率三學諸生伏闕訟之言至激切理宗目以狂士歲丁未及代兼領本州教授攝知録參軍吕文德以保康軍承宣使沿江制置副使知濠州辟公招撫司從事發運司亦聘入幕至此有勞尋丁友仁先生憂歸服闋遷臨安府府學教授升黜必當士論數上書言事丞相謝方叔有不才子淆亂朝綱京師目之為小相嘗使招公曰吾幸讀子之文服子之義久矣子來吾能使吾君相以史館拾遺之職居子若此者凡十告朔而公不往時余玠子如孫帥蜀貪殘廢法而軍民潰亂公因上言謂玠無義方死有遺辜乞斬如孫函首謝蜀其所盜財以給軍士如此則朝廷不失政刑與大臣之子弟專權亂政者必聳然知懼矣書上小相怒諷臺臣擊之因失職謀去丞相免董公槐為相言之理宗特創員外闕留置京師從事以寵嘉之時丁大全居政府公固辭不就蓋公屢上書詆之也寶祐乙邜槐更奏公入江西庾幕尋改幹辦本道提舉常平公事待次六年不就使者史繩祖屢書起之既至遇冨貴黃萬石有獄賂使者左右枉其事公爭之賄以不行於是下不受屈勢家訖無犯法者江右因號公為鐵符尋攝提舉事政尚廉平多所平反屬郡有獄載逾年不決者公令郡縣以其獄上皆一旦遣之民以不冤先是南州之俗上元競燈歲郡縣費不可計公謂作無益害有益悉禁止之及古心先生江公之執政也數薦之朝而憾已者當路竟循承直郎幹辦浙西安撫司公事不就時賈似道平章軍國重事權侔人主至是屢書起之比至似道憾相見之晚以公試館職與黃鏞偕召公言朝政失人心者三事并誦林實夫所為餞公序實夫者南州之髙士也隱居不仕見似道之專政宋祚之將絶也故其序有曰孔子居上貴寬寬非懈緩縱弛之謂也宰天下者其量要足以容天下而後可非得廣心彌性之士日相與居必將環視四顧動與物敵且以胥戕為能事矣推原其故則亦求賢之誠不至反以自病也今相君汲汲焉求先生如是則如前所慮斷可無矣而區區猶願一言近世一種小夫以􅎱嫉為納忠以隔絶為自獻附耳而啓有同告密畫界而立有似法壇盡絶一世公議于鈞陶之外獨以左右便嬖為腹心耳目察之不審一惑其言則吾之自處日狹志趣日陋常恐諸侯客子之來盻盻然慮其軋已也是雖有周公之才之美且無足觀積中書二十有四考吾亦何樂于此哉相君心廣體胖天下擊壤鼓腹矣不然其細已甚民何以堪有如此意皎然甚明發揚蹈厲歷歷為相君言之非先生誰忠於知已孰大於是考亭夫子有言吾輩有百萬生靈盡在此破漏船上但喚得一副手稍公不致失墜其益非小抑吾言多忤必先生然後能為吾致之似道佯唯唯未幾以陳冝中昜公召并浙西職罷去公行且嘆曰已矣彼人哉遂去之買田宅於始蘇既而悉散之曰吾聞河潤九里漸汝百步是將為解甲休兵之地矣乃步歸故里杜門著書號泉田子遊從者屨滿門外當時翕然師尊之始徐公元杰之遇害也朝廷以京秩官其子直諒仕至顯官次直方不受德祐乙亥起家亟廷至殿院首薦疊山先生謝公為江東提刑再薦公與劉辰翁皆有將相才冝膺重寄朝廷方議以公開閫東南未幾官軍下新安明年下錢塘公深居一室但書范粲寢所乘車數字於是不言五年矣又如是而卒蓋至元二十二年乙酉歲十一月也享年七十終正寢先一夕畢召家人曰吾將逝矣必殮我以集英殿所賜𫀆笏庶幾可見先帝于地下又命其壻江愷曰死矣履善甫得其所矣不可復作矣謝君直與豫皆不茍合於世者矣是嘗顧比于豫疊山先生嘗書其門曰要看今日謝枋得便是當年許月卿云是深知豫者也吾死子盍於是而銘我焉翌日夙興盥漱深衣危坐笑語如平日薄暮儷然而化四方之士聞者相吊來臨其喪為詩文哭之者蓋數郡縣公疏髯玉貌秀目豐頥舉止間雅望之似神仙中人每夕令家僮候月出還報徘徊清嘨竟夜不寐當時謂之再生子瞻其所著述纍十餘萬言時時為人取去其僅存者十二三先是常州教授李夢科刻之毗陵郡庠彭福龍刻之廬陵皆公門人也其刋于家孰者如毗陵本從孫汻復增益於散失之後今其本存焉公家藏古書亦千餘萬卷一顧率終身不忘嘗與友生遊僧舍方曝仸書使生觀之曰法華經也公因記憶嘗觀是經于徑山既三十年矣因背誦之不遺一字其為詩文未嘗經思如長江大河出入霄漢不可測度也𥘉公深見知於理宗將不次任之為權臣所沮公于是著百官針凡萬六千餘言比進會理宗棄群臣而尼古心先生見之嘆曰確乎有經世之實人主當置一通于坐右履齋吳公亦言公在熙豐不黨於熙豐在元祐不黨于元祐者也董公槐蔡公抗皆戒公以和平勿過剛公曰大臣宰相以此取士特未之思耳夫和平以從我豈不和平以從人勿過剛以順我亦豈不能勿過剛以順人靖康士大夫率由此道許某只是一許某決不能枉道以事人也公始受學於董公去事子魏子子魏子為世儒宗當時登其門者謂之登天公受學有繇學道有得是以身益困而志益堅志益堅而道益明大節卓乎其不渝也夫人安定程氏生二男茂登仕郎薰進武校尉皆早世女五人夫人先公沒晚生二男翼飛女二人母方氏孫男四人文相文晏文侍文任孫女六人曾孫三人以至元二十四年丁亥歲十有一月葬公於婺源西七十里之仁洪與程夫人墓相望五里先是愷受公遺命乞銘為狀未定而疊山先生北行不辱而死矣鳴呼既葬矣日月逾邁事未昜成而愷亦垂老於是謹更狀公行將以求文于當世之立言君子名能文於天下者延祐元年十月日季子飛狀
