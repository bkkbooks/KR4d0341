front:
  text: 先天集卷二
  hash: sha256:925c071fb6d945f884396c1bc7582e9ee47177ed4654bdcec3771688239de23e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_002-1a}
body:
  text: 律詩五言木犀詩到黃𥘉上髙標不肯唐先師鶴山魏文靖公常謂唐人小木犀詩分封在香國筮仕得黃裳錦畫纍金印瑶英案玉皇黃香天下士誰得並清芳曉幄曉幄明𥘉日晨鐘遞北風人生行樂著天道好還同我友詩三昧吾衰酒一中萬間君雅志突兀倚晴空雲邊雲邊人種麥天際我歸舟月色輕寒夜笛聲何處樓久晴人渴雨􅌒仕我思休髙士傳間看東籬花正幽明月明月天雙鑑清湖地萬弓人行楊桞外身在畫圗中天濶雙眸快樓髙萬象融故山應更好楊桞映芙蓉主學言湖樓甚佳只欠芙蓉甥館五首月色真圗畫風聲古瑟琴月風天地職風月聖賢心竹砌水如璧梧岡朋盍簮不須聮句得天籟竹梧吟冬至思吾姪樊川示阿宜驅羊官易取觀象易難知不逺復三字大音聲一詩屏山宗邵子晦木不忘歸醉鄉真廣大靜夜絶囂塵月色明如晝天涯總是春鳥飛林不夜蝶夢路無人天地中間我孤髙誰與鄰國士今為鬼有棺空斷腸緑衣長至節丹旐短松岡父乃哭其子天乎殱此良傷情臯某復挽些謾巫陽國士報國士後人哀後人萬物邪勝正一理屈終伸秦暴二世滅周仁八百春紫雲樓上語億載宋深仁吊程貢元灑淚陳情表何心貢澤宫波平看躍鯉浪急不成龍花誥榮孀母藍袍付畫工無人儔孝友煙樹慘新封代仍六弟吊程貢元三首仁者竟不夀世事空悠悠霜滿人洪墓月寒尊美樓慈烏千載恨薦鶚一生休畫史成何事青山炯照眸嚚訟漸成俗如君今豈多仲尼仁者靜下惠聖之和夜月數聲笛春風一再歌紛紛當泚顙視此石嵯峨松下草不殖豪家多不仁惟君淡於水與物靜為春多為流涕者應無切齒人墓前有梧檟那復見荆榛挽番陽戴如曽貢士母金氏霜氣凛閨妹嚴風老更癯詩書謂有子門戶可無夫雛鳳橫秋鶚孤鸞啼夜烏長松有風雨枯草但平蕪次韻汪敬子好善芝蘭馨惡惡鮑魚腥一心宰天地萬世流風霆六經如元氣異端如氛埃會往洙泗濱傳取心印回挽汪士洪昔日杜小姪中年馬少遊不知身外事祗覺鬢邊秋有子三株柳同公荒草邱梅溪一夜雪片片逐寒流同滕推遊朱緋堂二首當日朱緋夢荒煙化鶴城斜陽邊草色深樹裏禽聲欲雨路微濕出雲山半青神遊應故里只欠愛翁亭此翁有山癖曽此夢魂驚慷慨思逾淡郊行酒易醒石苔和夢濕歸棹載詩輕回首暮雲碧兩賢沙磧行挽外舅二首人間三十二名字幾千春慷慨漢遊俠孝慈周吉人視物猶視已顧親寧顧身山中當出相嗣子世其仁月卿方髻時公欲東床之我姑已黃土公鬢正青絲忽忽成今古茫茫問孰誰但能抱茂子灑淚讀新碑有感一飲地黃酒冤哉入九泉雲孤無葬地雪霽有蒼天今歲難張詠他年髙董宣視吾匣中劔光射斗牛邊住黛障黛障地眉展緑波天畫開鴛鴦長不散翡翠去還來壇杏頽垣裏隴梅荒草堆山川渾似舊不管曲聲哀夢中作我來煙水逺漁艇夜鳴榔萬仞巫山聳一宵秋夢長金翹何婀娜玉佩遽叮噹月冷天雞曉空餘枕屏香間賦老大天諳練殷勤月往還岩巒有竒操泉石亦清淡隔浦飛秋葉開窗看夕山天心端正月潭水夜深叄野人野人方蠖屈天子正龍飛東閣翹林騪北山移鵬來賈生去熊兆太公歸地主殷勤别雲霄萬里期次韻鄭將士何曽離日用千古到如今菊蕊霜全節梅花月印心韓公蘄竹詠蘇子楚山音鄭蘄人號楚山谷口微吾子風流何處尋霜日霜日步行遲雲山履曆長蘆花相遜揖松樹自宫商竹動鳴珂里桃成衣錦鄉水邊籬落好一夜玉為堂得安道中洲渚但明月人煙如曉星春泥才故里秋水又浮萍衣破披簑冷厨空煮草腥抱兒含笑語衣裏麥青青挽胡制機康侯鷺點青松白鶯穿緑桞黃兒時工對偶老去更文章誅意平生學爰咨去路忙酒邊招隱操我更憶山堂寄郭衢州渤海潢池盜龔卿奉詔憂東軒繼芳躅西府踵清流同榜黃扉匹中峯皂蓋儔中齋同一笑山屋好中秋重寄郭衢州細數東京士無如許郭優山林異朝市姓字欠書郵久巳巢由隱難成李郭舟三衢春有腳山屋好中秋寄留夢炎山屋好中秋中齋炯在眸中流誰砥柱野水却孤舟上意甘盤甚來遲季子留願毋淹獨樂留相九重休重寄留夢炎安得肉生羽從公出外遊同年多契闊新句孰賡酬天玉梅花雪人寒野水舟中齋難醉白山屋好中秋夜永夜永月清甚雨餘風快哉月將槐影出風遣桂香來風至地自掃月來雲亦開三千翰林手光霽瑩靈臺客來客來商略詩夜市正驚時雲破天青眼煙收月白眉芙蓉天富貴松竹月清竒我醉欲眠去携琴明日遲咸淳咸淳風樂好淳厚似咸平人意逄春樂天心遇杜晴征僮催逺信舞袖促新聲今歲梅能耐咸平詩可盟送張平湖山遊殷勒來訪别去作子長遊雪霽月清甚天寒鴈過不沙堤今相府花苑古蘇州歸路梅花好還來問白鷗次胡伯凱韻日日常三絶時時酒一杯西銘爐上雪太極地中雷屏破青山出池成緑水來飯餘三兩步一樹木犀開題項橫父臨清亭時方生孫青梅如豆子更可緩臨清倚杖間花落憑欄芳草生逄人須説項生子又添丁千葉桃難實山茶耐久盟捧硯姬空翠二首捧硯姬空翠隨琴鶴曉煙夕陽更山外流水自樓前芳草垂楊地和風麗日天戲遊看處處明媚自年年看山車放慢遇水馬爭先須信一年景無如三月天露花如此好煙桞十分員客醉不須去竹床相對眠獻歲獻歲歡聲沸清晨寒氣侵四時春是首三日雨為霖緑展垂楊眼青呈芳草心日晴仍夜雨擊壤費謳吟梅叟梅叟真佳客氷壷賢主人移樽隨月飲顧典到更深蠟炬精神耐梅花氣象新明朝山屋去隱者詎能尋挽妹壻汪汻四首奉禮徒員外京師枉治中二郎槐不做四老橘成空三鳯璧岩子雙龍寶劔雄萬人真莫贖愁絶老坡翁郎罷當年語深閨婉娩三有齊之季女必得有竒男滿目􅈱􅈱泣傷心切切彈離鸞驚别鵠何日淚䀶乾一疾那知死三朝竟不醒遺羮真慘愴分肉尚精明玉樹衣難綵璧岩氊枉青英魂千古在稚子讀書聲亡恙璧若日媒云婦有依世科君六世時事彼一時寂寞吾州隔諸孤我妹慈九京逄桂老東坦愧羲之燈火燈火掩柴門踈蕪煙水昏雞啼孤月曉犬吠隔山村桃葉翻新曲梅花返舊魂凄其何處笛一笑卧空樽月色明月亦清哉清風絶點埃村童催睡去野叟問禪來樂事賞心夜清風明月梅夜深羣籟靜猿鶴莫相猜帝學帝學須君入天遊輸我豪君方注老子我自讀離騷湖上春風好山中夜月髙山髙君寄內湖海我陶陶次韻蜀人李施州芾端午幾日愁無雨夢回聞雨聲恰逄端午至不覺和詩成慘淡疑天淚滂沱吊屈生邦人云此日隂感助隂兵臨川人謂端午日雨鬼旺人災對時思故國客裏厭南音同谷凄涼惡三閭感慨心賜衣聊杜句要艾孰騷吟莫説成都景岷峨秋滿襟送撫倅林評事歸班分月年將滿朝天早戒嚴芝函新紫詔棘寺舊青氊梅雨啇岩讖槐花宰路占應留待漏院揮翰屬名賢天貺天貺逄佳節地靈鐘異人今朝書上考同日是生辰部使星留次臨川月半輪明年當此日五馬列朝紳飯了飯了庵中坐髙情等寂喧井泉春戶口篆火午香煙句好堪呈佛心空不問禪一聲天外鴈秋意滿徽絃大行皇帝挽詞五首創始昌陵漢中興髙廟堯登遐皆十月揚烈擅三朝再造煌煌業參侔浩浩霄中興兼創始二帝侑逍遙享國昭陵似龍飛四十春哀榮皆甲子創守又庚申刑措成康治風移堯舜仁瑶編再仁祖萬葉道如新紫陽儒者侣恨不與同時指示四書要躬親百世師欽崇道兢業懷保誥寬慈玉殿凄涼處瑶題尚啓敷從諫如堯禹聞言若舜文五臣躋三誥斥君聖度天同廣忠謀日有聞甲辰親䇿處戅論玉顔欣此日營陵處當年育聖鄉幅員哀踽踽羽衛道煌煌有彗憂天墜重輪麗日光謳歌吾君子千載聖情傷七月而葬始有挽詞制也聞哀則賦臣子至痛之情也百世報宗廟千秋永𥙿陵此詩似泛只此二句諸廟諸陵皆可用贈快霖有客闖東籬星翁身姓支快霖為道號直術不支籬試與談災福斷然無詭隨小溪天下士持此往參之神靜神靜何須卜心間即是仙芋煨牛糞火瓢滴馬鬃泉緑染春風桞紅勻曉露蓮明朝晴景好一棹盡平川寄陳宰上國春多雨西江蓮自香恐人疑少室惟我薄淮陽南北東西命君臣父子常到官理詞訟月色更風光次韻李制幹贈行科舉有衣鉢臨行問細君梅花入征夢楊葉礪功勳儼對丹墀日捷排閶闔雲政須及邉事毋惜齒牙論山川山川長不老人意欲如何霜後蒹葭健秋來洲渚多河汾周舊典洙泗魯餘波悽愴從陳蔡令人涕滂沈先天集卷二
