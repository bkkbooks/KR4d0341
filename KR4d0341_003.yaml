front:
  text: 先天集卷三
  hash: sha256:19324ffe41898dca7dbc369c837d73a84d9cf1dacef5be38fd9750f595e7492b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_003-1a}
body:
  text: 律詩七言天道天道尊髙父道同地親如母祀先農社翁不肯飲殘水野老猶䏻存古風簫鼓村田聊擊壤雞豚社酒好治聾滿庭芳曲還堪唱一笑東坡鬢巳翁木犀桂犀明辨不雷同長憶先師品藻公風到如開香積國月明疑在廣寒宫含香結佩風宜月纍印懷香月稱風酒裏典刑幸猶在先師醖藉孔林叢次韻晉三姪招豫及同年飲戀闕重陽不入都菊英雖好不千渠樽前丞相方行酒花外堯夫恰小車羯末封胡延客醉雷陳張范預期酤他年三徑羊裘隱君子應能范蠡圖次韻雲岩權輿於我屋渠渠久敬如君世莫如明月清風詩滿案好天良夜酒連車樽前逺韻輕盈菊醉後分題爛熳書凡此坐中人十九鉤樞玉帶客金魚南堂南堂有客䅤秋旻面面軒窗納曉雲雲入書檠無俗艾舟聖主攘夷修政事可能吊伐至枋頭玉川破屋抱遺經生子添丁意命名門暗碧雲憂國志窗明紅日愛君情桞緑學徒勤左孰花紅主婦饌前榮他年誰注徵君傳好把吟篇著眼評山巳幽幽墅更幽幽居别墅儘居由數間屋想今岑寂萬斛船欣正拍浮採藥幽居憐閉戶圍棊别墅夢歸舟明朝菊徑歸來處二阮黃花插滿頭孫枝遙喜道韋經老手摩頭咳唾名豚犬吾兒夷姪虎龍孫祖退之情洗兒湯餅吾方拙教子鹽梅汝更榮許氏一門忠孝盛䕫臯熊虎延評用韻簡如晦龍溪育秀自平陽千載詩葩分外香錦里篤生天下士玉堂曽看甲科郎龍溪季子代無乏鶚薦明年定破荒桂樹黃堂秋色裏何妨演習鹿鳴章用韻自述菊花開處即重陽月桂中秋夜夜香紫綬象環如魯叟綸巾羽扇亦周郎不憂鴻鴈稻梁少但恐鶴猿松菊荒宰相山中書幾考清風明月老平章八角八角亭中天似水七言城裏夜未央主人解榻賢材館門客避堂上下床籟寂寂時星歷歷泉涓涓處山蒼蒼主人門客皆觴詠羽扇綸巾獨篆香歸塗望外雲頭日髙掛竹間亭子雪猶存銜蘆鴈起瀟湘暮賣炭人行烟火村綺疏月照窗如晝寶鼎香銷帳似雲欲轉氷壷渾未暇党家習氣彼羶葷次韻程願二首我家張許同生歲果者堯時值聖明丙子與君無貴者甲辰惟我亦同庚間雲萬嶺林泉興明月一溪邱壑情同歲同心有如此相期歲晚李歌行二李歌行醉裏歌君溪兩棹我烟簑鳯凰臺上我山墅虹馬軒髙君月坡曉徑𦦨間追李杜夜窗灰裏撥隂何長哦歲晚成二老詩社往來君肯麼寄顧次嶽五首栁塘醉我無邊酒得壠癡生望蜀心亦有白衣雙白玉不孤黃菊萬黃金寶婺古來金繡水銀蟾後夜玉青岑韋齊井畔通宵月應照空樽印渴襟韋齊井畔通宵月流出文公闕里心半夜起來湖瑩玉明朝應有栁搖金萬壑正看天地肅一樓坐斷水雲岑鏡湖樓扁知無恙二十年前醉解襟鏡湖扁字無今古無古無今只此心雲入枕邊堂署玉月窮天外日鎔金樓臺髣佛水墨畫烟霧空濛岩壑岑須信尚書最難讀人間無許大胸襟運千可際休明運心一堪傳賢聖心不一此心非自玉半千之運或如金道源天出三清境逺目明雙寸碧岑胸次須令天樣濶五湖為帶三江襟半夜開忩憑䦨坐無心雲起鏡湖心鋪茵煙草漫天幄璞玉樓臺渾色金訪古寂寥秋漠漠懷人感慨碧岑岑未知何日韋齊井明月清風煩暑襟鹿鳴用趙資相韻宗主人才郭子儀門多將相蔚相輝托根小草秋榆宦食葉長廊春棘闈報國自憐心事壯憂時不覺夢魂飛平生此志非溫飽勳業從公問指歸入邑問炊中雲招王希聖起龍三首希聖平生詩酒豪居然閉戶學孤髙不知昨夜秋風桞得似當時春日桃别去半年猶旦暮胸中百癢缺爬搔虎溪破戒君須解巳辦清詩與濁醪移文招子氣添豪畢竟牢關計未髙留得商霖活秋稼未應禹浪怨春桃半窗明月詩誰和一劍空燈手自搔來此共君思昨夢秋風江上幾投醪簞瓢不改乃真豪之子胸中志自髙本自無官彭澤桞不知何世武陵桃窗前草色勤鑽仰堂上萱叢敬抑搔好向中庸看未發養成和氣盎春醪遇黃先生策馬沙頭值此翁恐成鴻燕嗇相逄歸鞭亟指逺峯碧握手頻看笑臉紅淡月一簾清坐處髙風千載慨歌中淵源自昔崇師友吳下應憐舊阿䝉和趙資相手托東南半璧天向天捧詔下搜賢塵沙騎鶴征鴻倦衢道乘鸞病驥先玉陛九重將玉立珠簾十里看珠聫狀元宰相平生事雅意中原願執鞭追賦暮游余庚子冬潔潔離廣陵將肄奉常試業于京師舟泊無錫日已暮與王希聖微服游南禪蓋訪古也參寥題名璧無恙寺記有碑碑隂結字甚偉視之蔡京也出門煙樹蒼然數僧遇語而已余與希聖却立四顧曰此佳景也當寫之為詩而舉子業亂其中不能就暇日追想宛在其目為詩以寄希聖其明年冬十一月也歲月驅人又可一慨錫山舟泊似荒村微服南禪古跡存璧上姓名今巳逺碑隂人物了能言薄游􅋄􅋄山侵䄂逺思悠悠風滿軒携手出門烟樹密數僧離立語黃昏次韻葉司戶舟自搖搖釣瀨濵睦州司戶得詩人吉州司戶官雖小曽得詩人杜審言對床夜雨如蘇子滿座春風似伯淳文武略窺瑶殿射婺衢爭耀錦鄉春金華葉相垂青史青出於藍局局新次韻黃玉如大章携先集來訪二首夜宿槎溪碧草幽草窗招隱勸巢由朝來忽得新詩好客裏俄驚喜氣浮秋老空山唳清鶴天寒野水卧孤舟細吟天下黃香句曉霧輕烟古渡頭橋梓風流滿腹經桂花香裏識魁名翻成宵夢古今事何况人間父子情先集一編詩槖富家傳萬卷子金榮挂名叙跋流芳逺曉起吟窗仔細評再和題黃免耕吟藁免耕遺藁九京幽宿諾吾方負仲由宿諾斜陽悲宿草沉思一旦落沉浮池生春草虛堂夢楓落吳江何處舟有子九京如不死一輪明月墓山頭優游一辟難贊經仲舒師友盡時名已登鄉國一經薦未究天人三䇿情文定浚源雖瑩徹牧堂奕葉必敷榮𬗋陽風水深留意磨石佳城後世評𬗋陽明地理免耕亦明地理代仍六弟吊程貢元少從諸父與君遊到眼銘章淚莫收水闊騎鯨霜葉落波寒躍鯉雪蘋秋當時折桂浮雲夢今日叢萱暮靄愁惆悵人洪暗煙月淡凝碑字濕松楸寄題岩經樓樓中圖史淡爐墨中有成都較藝文手澤存焉生舊感心傳妙處長新聞世科事業無如子經學源流可致君祗恐校讎天祿閣猿啼樓外滿溪雲次韻仲成叔賀雙桂橋展墓歸來春水浮橋頭望月正如鈎橋成未用問誰住意逺應同逐水流天外鴈鳬何足許人間鹿豕可同游須知莫說存耕知有秋滿城風雨近重陽滿城風雨近重陽一舸烟波入醉鄉心事巳同鷗鳥白眼界空有雲山蒼酒安䏻管興亡事菊亦頗復時世粧何似長歌明月裏月明天濶地更長挽座主吳倅菊翁去後菊園荒夀不如花儘自香進學解成誰具錦題輿字濕巳黃梁衆流出壑三秋暮明月照松千仞岡冷落僧爐數間屋但留名節付賢郎登慈恩絶頂有感為學平生不究源未妨絶頂上慈恩塔髙俯視群山小江濶䏻容巨浪喧人每中登難腳力誰於髙處領天根須信平生為基址基址牢時德業尊挽陳節使凛凛如公一寸丹荒城夜月徹清寒向時尚已死諸葛今日難貪老阿瞞素志平生兆馬革黎民一郡博彈冠隻雞斗酒群群䜟吾力猶䏻滅賀蘭挽李左藏少年謂子氣橫秋壯巳邉城汗漫游筮仕弗如歸亦好讀書未了死方休半生懶意琴三疊千古詩情土一邱月落錫林烟露冷松風無籟自颼颼挽清湘令董介軒夢程先生偏得人間謗與名蓋棺方定伯夷清五經笥滿風雲壯百尺樓髙星斗橫明月照庭香不斷狂飈吹雪意如生河汾回首成今古禮樂猶將致太平挽馬樞密母假氏松岡新植瀧豐碑千古哀榮誰似之訓子斷機霜雪冷退朝猶績月星垂緑衣西府梅花落素幄北堂萱草萎何惜沙堤明日路潘輿無復再來時次韻朱塘三首淳祐二年春王正月丁已許月卿過滕滕子曰子嘗游朱塘乎曰未也曰淳熙之三年朱文公歸故鄉游朱塘山深水靜荷華其間慨然曰是吾夢游所也此誰之土於是先大夫拱而進曰先業也先冢在此文公曰是宜為亭以領山水子取幅𥿄吾為若書以告同志者共成之先大夫雅謹畏時又少四顧無楮筆則已異時為鉛鈞言以為恨常試與子游乎遂如朱塘歸相與為詩秋八月亭成郡丞祕書郎書其扁曰晦庵亭滕子以三詩來有普之者冬十月詩成月卿用韻亦賦之杏壇黃葉滿霜林何幸朱塘兀古枌試上月臺因問月知涵雲谷幾多雲夢游當日成何事嗜學于今喜舊聞我意昨游春水滿重來秋意見涯垠游子從來悲故鄉歸來襟䄂芷蘭芳夢魂飛去雲濤逺杖䇿間行秋水光可是夢中曽到此安知身後却餘香𬗋陽弟子有賢子卜築新亭真肯堂謾著新亭俯碧漪髙低草樹任差池須知亭扁須時彥不是溪齊不勇為水靜山深悉天趣風光月霽足吾師未妨賦誦銘顔樂正學於戲無已時與陳宰開先到處逄人說大蘇一門兄弟古今無吹塤林五黟山馬鼓瑟陳雙婺水鳬定分有殊自鵬鷃間情無限儘龍猪歸來坐倚蓬窗下少挹春風過里閭迎謁劉朔齊提舉行部百城奔走候車塵庾節光華婺水濱人望朔齊春有腳家傳元祐水無心天低日近霜華曉地僻臘殘梅蕊春願得劉家再忠肅前為伊鼎後商霖先天集卷三
