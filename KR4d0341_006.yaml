front:
  text: 先天集卷六
  hash: sha256:0f8deb41f1caca77f3f10067e0bd52dff59ddf0a17eaca5a44cc7d59cd8b596c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_006-1a}
body:
  text: 絶句五言贈朱野拙官樣何如野謀生拙最宜君門標野拙篆刻大精竒絶句七言千年千年光景東西漢一把春風大小喬坐嘯行吟芳草碧杜䳌時節雨瀟瀟黃菊黃菊飄零滿地金詩人枉用一生心木犀滿地金英落消得詩人曉夕吟次韻胡同年女吳猛幽閨育彩鸞飛瓊相約下人寰老翁年復兒時貌乞我靈丹駐玉顔人間人間瀟灑桞塘仙三遣詩來各四篇安得左鰲右杯酒與君爛醉桞塘邉次韻馬樞密二首卧聽急雨半篙深曉展芭蕉數尺心携手方山行樂處滿林松竹翠隂隂年來閉戶學崇深邂逅論文恱我心濁酒一杯茶一碗坐看日影轉桐隂入邑道中三首苒苒歲除佳樹少行行髙處烈風多世間無若歸田好其奈吾生未老何鼎立三才名曰人分眀宇宙為經綸不應雪虐風叨後便作岩棲谷隱身天涵地育王公旦德備才全范仲淹萬世直教懸日月肯如秋雨謾亷纎有感二首晴明佳思吟難盡雨雪愁寒撥不開天地中間許多事不應暑往不寒來日忽出天將有雪雨將降地忽無風隂陽二氣循環耳靜入儒生一笑中賀滕推入郡奉祀溪齊之後未多年有子親曾聞性天助祭此行春滿眼沙明草暖白鷗眠途問伍乍雨乍晴寒食候半花半蕊山􅈨香老農甚喜天意好日暖今年不凍秧車中路平正好坐車中時有禽聲山翠濃慿軾斜眸看法帖開簾正面受春風白雪白雪家家拆蠶箔清風行行入秧苗半開猶蕊花情逺久雨𥘉晴禽語驕槐影槐影本來惟戴日蟬聲固自未知秋斜陽薄雨羊歸徑冷月橫星人倚樓吟蛩吟蛩不管興亡事舞蝶那分夢覺身别浦連墻歸逺客髙山小徑過樵人朗湖道中因見二事信筆二首屋下種花簷露滿窗前叠石岫雲生春風不解分疆界本自無心却有情烏雀逄鸇皆億鳳鸕鷀遇獺等求魚秋風雪散天無極清曉冥冥鴻影孤贈碧鑑相士蒲田林行可君如碧鑑照英雄我鏡清寒印太空請向文昌橋上看碧天提出碧流中贈談命韓東野時來風送滕王閣運去雷轟薦福碑莫道去年曽算了從知禍福逐年移春日夜雨晝晴花世界晚風朝露桞精神花花桞桞春何限安樂窩中第一人與鄭婺源凄凉客舍岸維舟明月清風古渡頭飛鴈不來雲欲暮碧英一樹十分秋賀楊司戶庭玉楊關酒盡不成聲楊桞烟中一棹輕日暮碧雲烟水濶梅花難寄此時情新安道中白水黃山天一青雪梨金桞眼雙明要知來日清明日請聽鵑鳴第一聲無山無山平野雲天濶有月髙樓烟水微渴睡車中鶯一囀愁吟路上蝶雙飛望中望中惟有山平逺山外更連天沉寥好著箇亭𬋩烟水夜凉明月舉杯邀首夏首夏清和如惠夷心情熙洽似唐虞竹梢巧送月到牖荷葉亂迎風入湖用勻吳𥘉鄰沆􅒭崑崙未曉霞霞邉何處著瑶花𥘉鄰扁字光穿室花外何時我小車題婺源齊廳濃淡烟雲山展畫淺深篙櫓水挼藍扁舟我欲春風裏魚鳥依然舊所諳次勻胡梅瀧對梅花每恨匆匆竟日望斷胡梅瀧欲往從之秋水隔參橫月落夢渠儂夢渠處處曉星殘秋水盈盈隔曉山山外梅瀧應秋水一泓秋月夜將䦨月庵羽人蕭散月庵深問月青天無古今但放虗庵如月樣更教月住在庵心廣寒只缺栽梅樹寄傲何須傍桂林君尚有庵我無有不遮明月半邉隂贈寫梅僧處能月明窗上老梅癯我有天然水墨圗笑殺無文癡老子氷綃影裏覔林逋答雲甫程文一川風月有餘地萬頃烟波無盡天蝶夢笑渠飛緑樹鷗盟了我釣魚船風將楊桞緑鋪地月畫蒲萄架在池却扇清風嫩凉夜携笻明月共歸時贈竹溪子厚有溪渾未竹徽之有竹不能溪試問竹溪何所似風流六逸共標題贈張相士我生丙子自盤空愛主憂時水注東願子相人無軟語莫教人喚密翁翁贈梅隱術士張尉梅仙亦向市門隱君去市門翻隱梅貴賤窮通春夢覺孤山依舊水邉開雪後青山露出本來靣白雪消融清净身松樹也知修養法白頭翁作少年人萬木未春先玉蕊千峯非浪亦銀山雪融畢竟無蹤跡依舊梅花耐歲寒雪瀏瀏時逄曉日水𥻘𥻘處識春風天公留取峯頭雪與作人間别樣春送髙安辛聖祥謁後林論相何如只論心無心無相更難尋清風獨卧羲皇上床下明朝拜後林送徐君何英雄捧詔出樊籠抖擻征衣趂曉風一笑相逄儀舌在明朝秋意滿芙蓉簫鼓簫鼓元宵氣象豪拗晴天意亦風騷怕渠窗外梅花落永夜吟聲不敢髙雲護雲護輕隂桃桞𥘉太平無象酒邉壚上元晴景樓臺曉一樹梅花並雪豫月明月明如晝好元宵歌管樓臺景色饒鶴舞琴聲相應答梅花清福共誰消咸淳五年天下都散漢許月卿飲無算醉後吟詩秉筆逹旦逹且吟詩逹旦飲半生信直半生貧睡魔猶侮汪梅叟何况悠悠俗纍人此行此行得得不虛行兩豸雌雄聚德星憂國愛君吾輩事囑君當局喚惺惺樂天樂天歌裏啇人婦子美詩中黃四娘莫向癡人前說夢世間萬事海茫茫風起風起成文天氣好水清如鏡地如鐘師門名節千千載直與湖山共不窮觀吳廷玉五雲歌書其後而歸之鈞天九奏玉皇歸閣皂神馳重嘆吁勸子癡人前莫說怕渠來討費分疏旅􅋙啚戒􅋙式燕紫陽詩展畫如觀作訓時我道非唐無此筆宋人那解析豪厘次勻用學禮章泉姓字馥於梅宅相相逄亦妙哉見說章泉詩刻梓幸分一本洗塵埃跫然詩句慰空虛拭目科名看到渠了却科名詩未晚殷勤圯上一編書訪渭陽舅待甥如待大賔玳筵致語厚詞人玉堂金馬和風月應有佳篇繼後塵題劉後村所跋楊朴移居啚曽對君王已放還何須當道把漁竿使軺將宿人將避拗折漁竿趕入山呈翁司理名方子擢婺邑桃李春風山谷酒河陽桃李更春風風流建水翁承贊樽酒論文千載同跋東坡墨跡海外歸來衰鬢皤浩然之氣筆嵯峨富貴不淫貧賤樂萬年千載一東坡二芝蘭一年三季煒煌煌幽谷無風花自香香水風聲干鶴唳佳兒未數謝家郎即事桑柘行行秋又夕芭蕉葉葉雨和風古今陵谷休回首洗眼師門桂影濃九江滿目山川賢否異對床風雨弟兄同九江莫作淮西看記得九江元是東寄張立道故人華職又為州當日啇量今不謀捷徑終南共慙愧今人莫遣後人羞休休休休何似禹行水往往渾如宋揠苗看到五行精妙處月明溪上竹蕭蕭茶縻玉質清綃愛道裝不嫌春暮越芬芳宋風麝空使微材恨海棠默齊璧間竹鶴琅玕璧上林稍接倣佛胎仙舞雪翎欲識主人齊扁意此君相對不容聲星學星學精微蔣逸堂濓溪一賦見行藏樓髙照眼銀溪水萬籟無聲月印忩先天集卷六終
