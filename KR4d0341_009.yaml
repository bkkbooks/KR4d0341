front:
  text: 先天集卷九
  hash: sha256:b2606ba59ddeb169fb950f45850b91ae25f77d59223f8191ef8da4710318c357
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0341_SBCK_009-1a}
body:
  text: 經義聖王制御常道如何治外之道而律諸古儒者之意逺矣夫乍臣乍叛夷狄之常本不足為中國輕重也自昔聖人之所以處之者恃吾有一定之規于其來則薄其懲於其去則固其守於其慕義則姑惟以禮羈縻之操縱闔闢其權在我曷嘗舍是以為制御之道哉後世不知出此動有夷狄難制之憂而外求為控御之術倚戰者威或至於黷恃守者備或至於踈而屈已以為和者恩又失於褻在我者無常道往往隨時而為之遷就不知古人制御之道不如是也此班孟堅之贊丐奴歷敘漢家制御之失深有感於聖王之常道也歟聖王制御常道如何請釋其説甚矣待夷狄之不可無常道也無常道而待夷狄則方其強也冀其不吾撓必屈體以徇其欲逮其弱也幸其不吾敵必窮兵以快其忿至其當敵情去來靡定之時則又玩歲愒日籍口於備守之一説上之朝思夕惟下之獻謀奏慮其所以為控制駕御之策皆不出于斯三者而不知適所以為自弊爾于國家乎何輔然則夷狄不可得而制御之乎吁天下之事惟常者可以應變彼雖變詐不勝而吾惟以常待之則其去也吾得以釋然無後日之虞而其來也亦不能以得志于我制御之規隱然素具卒之國勢尊安夷變消弭何莫非常道之功用哉其視夫用威者徒逞于干戈相尋之際守備者求詳於邉瑣謹固之間和親者又不過金繒賂遺行李往來求之末後寧不大有間耶吾以是知聖王以不制制之乃所以為深制以不御御之乃所以為深御歟昔周盛時大原薄伐盡境而還此來則禦之常也豈若後世禽獲獸獮犁庭掃穴之謂乎采薇遣戍止衛中國此去則備之常也豈若後世戈杇鐡鈍老師費財之謂乎裔夷君長執其寶玉咸造以展覲禮館次處之國門之外此接之以禮之常也豈若後世啖之以子女玉帛要之以盟誓質約之謂乎乃知備禦綏懷之三者誠先生待夷狄一定之謀歷萬代而下不容昜也奈何漢世則不然蓋自髙帝以來平城之􅗮未幾嫚書之辱繼至含垢忍耻亦既太甚傳至文帝雖知積粟務農守邉備塞然斥堠望𤇺火將吏披甲胄悠悠歲月其可久乎至于孝武一不勝其忿則命將出師震威沙漠若足以雪前人之耻而士馬亡失海內虛耗竟何如哉逮夫清渭之朝屈膝讋首奉珍來賀冝思何道以待之而宣帝君臣方且待以殊禮客而不臣是何待夷狄之乖如此耶故終漢之世其備禦綏懷之道胥失之矣冝乎孟堅有感于此其傳丐奴也既敘其約誓攻守之非冝而終則言來懲去備羈縻不絶為聖王常道乃昔人之所常行而漢人終不復用寧不為之深憾而重其思古之意歟雖然有苗逆命急于徂征可也而伯益贊禹乃曰惟德動天無逺弗屇淮夷既平晏然弛備可也而吉甫作歌且曰矢其文德洽此四國西旅獻􅋙謂不必深拒可也而召公作誥必曰眀王謹德四夷咸賔不以區區夷狄強弱叛服為輕重而每以修德為言先王之所謂常道者母乃在此而不在彼歟使孟堅而果知此則推原古人待夷狄之道冝無大于此者矣何條析其言曽不出備禦綏懷之事而已哉劉珖所謂班固之言詳而未盡良有以歟此篇出宋論會省解之作也啓與曹徽州趣裝曹參已歌來暮受㕓許子敢缺恭先具位既激西江以蘇涸輒之鱗盍運南溟以展埀天之翼可以久則久可以速則速時止時行莫之致而致莫之為而為有義有命丹墀眷渥雄閣任隆親水地之侯仍木天之閣以昔繍衣之霜凛為今皂蓋之春溫惟花屏山練帶水之竒邅焚林田竭澤漁之後欲回生意必得貞廉彼貴聀之卿囊帛匱金而已矣此名世之士淵珠山玉如是哉歡迎西嶼之儒英快覩東嘉之文獻唐之壯郡今則漏巵守令牧民不損猶應言損水旱仍歲有聞竟不以聞既無思溺猶已之心安得遺利在民之意傳舍而又傳舍冨州那復冨州近因三凖一金銀之關殊覺十室九繭絲之苦折帛久例忽增一千茶租鑿空驟盈五百他可以類推矣其何以堪此哉拯溺救焚帝遣慈祥之父母興滯輔弊公行寬大之詔書民其瘳乎人所欲也因念歙黟之地實為財利之近觀婺女之范公逺考盤洲之文惠凡而相業一自吾州典舉今年尚憶細侯之竹馬運籌他日却看諸葛之木牛駕熟路之輕車添新安之故事月卿三秋蕭葛千里嬋姢風緊西淮交承托雲仍之久地寒東野覆庇竊天幸之多賀朱尚書新渥照乾坤清香森兵衛江西道院已喧來暮之歌文昌尚書即拜召還之詔喜真儒之用世多吾榜之得人前有昌黎後有魁峰可謂冝春之盛事入則周公出則方叔佇看中夏之太平訪祖無澤李泰伯之舊逰續黃頴川龔海浡之前傳廷臣傳至右者天子居然器之正此悽然忽聞郵報伊川之信息甚大欲郊迎而拜之夫子至邦政必聞不席暖而去矣幾若燕鴻之相避竟乖鳳凰之覩先去速來遲不肯於汝信處於汝信宿也别多會少機會如此邂逅如此粲者何賀蔡公杭郎宿天移使星春至臨海之政不肯媚俗即欲挂冠提泉之命所以表廉便當攬轡方楮幣稱提之無䇿故禮樂馳驅之有光欲今地上之流泉莫若屏前之至水貪夫廉懦夫立百城應竦於氷清能者用智者謀九府必資之曉暢賀厲制直九陛踈榮八專進律齊小白晉重耳半分天子之旌旗唐學士漢將軍增重元戎之節鉞若稽寧考厥其堯文峻寶閣之行見海隅之丕用作霖雨燮理隂陽賀余子新娶九月授衣正之子于歸之侯三星在戶協君子偕老之詩載錫之光云胡不喜某恭承天作之合文定厥祥俾立室家爰講九十其儀之盛釐爾士女行衍則百斯男之基鳩關關在河之洲鵉􅎪􅎪于蹶之里卜筮偕止琴瑟友之雖無嘉肴既有肥羜永為好也共歌桃李之三逮其吉兮猶喜摽梅之七碑婺源朱塘晦翁祠碑孔子廟終漢世不出闕里婺源朱文公之闕里也上即位之十有八年始以公從祀孔子則天下皆得祀况婺源乎二十有三年滕叔和以書來曰先君從遊於朱塘之上證兄弟子姪既沿文公昨夢之語作晦翁亭又立祠其西為屋若干楹文公南鄉坐先父溪齋先生告院君季父蒙齋先生合肥君東西鄉以侑焉秋九月庚申告成將徹田聘士以掌扃鑰庶幾中丁之祀勿替引之謹伐石請書其事月卿發書嘆曰不亦善乎今佛老之宫神怪之祠布滿宇內而吾黨之儒先頌其詩讀其書顧不得朝夕望其儀刑以自振勵則兹舉也不亦善乎嘗考之二滕公近聞於朱子者曰孟子道性善言必稱堯舜人性無不善則無不可為堯舜者要不可以一鄉之善士為足也嗚呼祠宇崇崇像設嚴嚴恍然當時師友之函丈也學者可以自勉矣立志以定其本居敬以持其志窮理以致其知反躬以踐其實雖地之相逺世之相後如會一堂况世若此其未逺居若此其近哉雖然為巳為人界限之大者也漢唐之儒以聞道之難而學無本近世之儒以聞道之昜而學無實竊道德性命之説以為譁衆取寵之資俗日以益薄治日以益卑職此之故歟嘉定以來士大夫專以朱氏之學為仕途捷徑二滕公當是時退然如未嘗升紫陽之堂者人為之莞而莫或顧也陵陽李文惠公持節江東旁收朱門記録問答之語得之如護拱璧待其人以殊禮溪齋獨不以徼利焉聞其風者鄙夫寬薄夫厚矣溪齋諱璘字德粹蒙齋諱珙字德章夀不兄若也某既善兹舉不敢以固陋辭遂書其事如左又為迎饗送神樂章以遺之其辭曰遊子悲兮故鄉駕余行兮朱塘山深兮水靜荷花淡兮自芳昔吾夢兮斯境羌一笑兮徜徉冝為亭兮水上以領略兮風光去之兮幾何季子兮肯堂亭既峙兮翼翼廟載作兮崇崇蕙殽蒸兮蘭藉寒泉碧兮秋菊薌以奉兮以嘗以拜兮以饗誰配之兮二滕􅌂師友兮弟兄超忽兮來八荒髣佛兮紛語降若起兮吾思惠我兮光明對越兮屋漏保之兮無疆扶宏綱兮勿之墜萬子孫兮餘慶先天集卷九終
